<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
<title>ParkQuick SG — Find available carparks near you</title>
<meta name="description" content="Real-time Singapore carpark availability, sorted by distance. Tap to navigate." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236366f1'/%3E%3Cstop offset='1' stop-color='%23818cf8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='50%25' y='55%25' font-family='-apple-system,system-ui,sans-serif' font-size='19' font-weight='800' fill='white' text-anchor='middle' dominant-baseline='middle'%3EP%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script>
  (() => {
    try {
      const stored = localStorage.getItem('pq-theme');
      const prefDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = stored || (prefDark ? 'dark' : 'light');
      document.documentElement.dataset.theme = theme;
    } catch {}
  })();
</script>
<style>
  /* ============================================================
     Design tokens
     ============================================================ */
  :root, [data-theme="dark"] {
    --bg: #09090b;
    --bg-rgb: 9, 9, 11;
    --surface: #131316;
    --surface-2: #1c1c20;
    --surface-3: #26262b;
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.12);
    --text: #fafafa;
    --text-muted: #a1a1aa;
    --text-faint: #52525b;
    --accent: #818cf8;
    --accent-strong: #6366f1;
    --accent-soft: rgba(129, 140, 248, 0.14);
    --green: #34d399;
    --green-soft: rgba(52, 211, 153, 0.12);
    --amber: #fbbf24;
    --amber-soft: rgba(251, 191, 36, 0.12);
    --red: #f87171;
    --red-soft: rgba(248, 113, 113, 0.12);
    --grey: #52525b;
    --shadow-card: 0 1px 2px rgba(0,0,0,0.4);
    --shadow-card-hover: 0 8px 24px rgba(0,0,0,0.5);
    --shadow-popover: 0 16px 48px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
    --aurora: radial-gradient(ellipse 70% 40% at 50% -10%, rgba(99,102,241,0.22), transparent 60%),
              radial-gradient(ellipse 50% 30% at 90% 5%, rgba(168,85,247,0.10), transparent 60%);
    color-scheme: dark;
  }

  [data-theme="light"] {
    --bg: #fafafa;
    --bg-rgb: 250, 250, 250;
    --surface: #ffffff;
    --surface-2: #f4f4f5;
    --surface-3: #e4e4e7;
    --border: rgba(0, 0, 0, 0.06);
    --border-strong: rgba(0, 0, 0, 0.14);
    --text: #09090b;
    --text-muted: #52525b;
    --text-faint: #a1a1aa;
    --accent: #4f46e5;
    --accent-strong: #4338ca;
    --accent-soft: rgba(79, 70, 229, 0.08);
    --green: #059669;
    --green-soft: rgba(5, 150, 105, 0.10);
    --amber: #d97706;
    --amber-soft: rgba(217, 119, 6, 0.10);
    --red: #dc2626;
    --red-soft: rgba(220, 38, 38, 0.10);
    --grey: #a1a1aa;
    --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04), 0 0 0 1px rgba(15, 23, 42, 0.02);
    --shadow-card-hover: 0 12px 24px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(15, 23, 42, 0.05);
    --shadow-popover: 0 16px 48px rgba(15, 23, 42, 0.14), 0 0 0 1px rgba(15, 23, 42, 0.05);
    --aurora: radial-gradient(ellipse 70% 40% at 50% -10%, rgba(79, 70, 229, 0.08), transparent 60%),
              radial-gradient(ellipse 50% 30% at 10% 5%, rgba(168, 85, 247, 0.06), transparent 60%);
    color-scheme: light;
  }

  /* ============================================================
     Reset + base
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-feature-settings: 'cv11', 'ss01', 'cv01';
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    overscroll-behavior-y: contain;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  body {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px env(safe-area-inset-bottom, 16px);
    position: relative;
    letter-spacing: -0.011em;
  }

  /* Aurora ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: var(--aurora);
    z-index: -1;
    transition: background 0.4s ease;
  }

  button { font-family: inherit; background: none; border: none; color: inherit; cursor: pointer; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 8px; }

  input {
    font-family: inherit;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    letter-spacing: -0.01em;
  }
  input::placeholder { color: var(--text-faint); }
  input:focus {
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }

  /* ============================================================
     Header
     ============================================================ */
  .header {
    position: sticky;
    top: 0;
    background: rgba(var(--bg-rgb), 0.72);
    backdrop-filter: saturate(180%) blur(18px);
    -webkit-backdrop-filter: saturate(180%) blur(18px);
    padding: 16px 0 12px;
    margin: 0 -16px;
    padding-left: 16px;
    padding-right: 16px;
    z-index: 10;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s ease;
  }
  .header.scrolled { border-bottom-color: var(--border); }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.025em;
  }
  .brand-mark {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    background: linear-gradient(135deg, var(--accent-strong) 0%, var(--accent) 100%);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 800;
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4);
    flex-shrink: 0;
  }
  .brand-text { font-weight: 700; }
  .brand-text-accent {
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-left: 1px;
  }

  .header-actions { display: flex; gap: 4px; }
  .icon-btn {
    width: 38px;
    height: 38px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    color: var(--text-muted);
    transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease;
    position: relative;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--text); }
  .icon-btn:active { transform: scale(0.94); }
  .icon-btn svg { width: 18px; height: 18px; stroke-width: 2; }
  .icon-btn.active-loc { background: var(--accent-soft); color: var(--accent); }
  .icon-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Theme toggle - sun/moon swap */
  .theme-toggle .sun, .theme-toggle .moon { transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s; position: absolute; }
  [data-theme="dark"] .theme-toggle .sun { opacity: 1; transform: rotate(0deg) scale(1); }
  [data-theme="dark"] .theme-toggle .moon { opacity: 0; transform: rotate(-90deg) scale(0.5); }
  [data-theme="light"] .theme-toggle .sun { opacity: 0; transform: rotate(90deg) scale(0.5); }
  [data-theme="light"] .theme-toggle .moon { opacity: 1; transform: rotate(0deg) scale(1); }

  .updated-line {
    margin-top: 10px;
    font-size: 12.5px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 16px;
    font-weight: 500;
  }
  .pulse-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .countdown-bar {
    margin-top: 8px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .countdown-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-strong), var(--accent));
    width: 100%;
    transform-origin: left;
    transition: transform 0.95s linear;
    border-radius: 2px;
  }

  /* ============================================================
     Search
     ============================================================ */
  .search-bar {
    margin-top: 12px;
    position: relative;
  }
  .search-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .search-icon {
    position: absolute;
    left: 14px;
    width: 16px;
    height: 16px;
    color: var(--text-faint);
    pointer-events: none;
    transition: color 0.15s;
  }
  .search-input-wrap:focus-within .search-icon { color: var(--accent); }
  .search-bar input {
    padding: 13px 40px 13px 40px;
    font-size: 15px;
    border-radius: 12px;
    background: var(--surface);
  }
  .clear-btn {
    position: absolute;
    right: 6px;
    width: 28px;
    height: 28px;
    display: none;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    color: var(--text-faint);
    transition: background 0.15s, color 0.15s;
  }
  .clear-btn svg { width: 14px; height: 14px; }
  .clear-btn:hover { background: var(--surface-2); color: var(--text); }
  .clear-btn.show { display: inline-flex; }

  .suggest-list {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    list-style: none;
    max-height: 320px;
    overflow-y: auto;
    z-index: 20;
    display: none;
    box-shadow: var(--shadow-popover);
    padding: 6px;
    animation: pop-in 0.18s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes pop-in {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .suggest-list.open { display: block; }
  .suggest-item {
    padding: 10px 12px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    border-radius: 8px;
    line-height: 1.35;
    transition: background 0.1s ease;
    font-weight: 500;
  }
  .suggest-item:hover, .suggest-item.active { background: var(--surface-2); }
  .suggest-item .sub {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    font-weight: 400;
  }
  .suggest-item.empty {
    color: var(--text-muted);
    cursor: default;
    font-style: italic;
    text-align: center;
    padding: 16px;
  }
  .suggest-item.empty:hover { background: transparent; }

  /* ============================================================
     Location pill
     ============================================================ */
  .location-pill {
    margin: 16px 0 4px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px 6px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12.5px;
    color: var(--text-muted);
    font-weight: 500;
    box-shadow: var(--shadow-card);
  }
  .location-pill svg { width: 13px; height: 13px; color: var(--accent); }
  .location-pill strong { color: var(--text); font-weight: 600; }

  /* ============================================================
     Banner
     ============================================================ */
  .banner {
    margin: 12px 0;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 13px;
    background: var(--amber-soft);
    border: 1px solid color-mix(in srgb, var(--amber) 25%, transparent);
    color: var(--amber);
    font-weight: 500;
  }

  /* ============================================================
     Cards
     ============================================================ */
  .list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 16px 0 24px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    text-align: left;
    transition: transform 0.15s cubic-bezier(0.16, 1, 0.3, 1),
                background-color 0.15s ease,
                border-color 0.15s ease,
                box-shadow 0.2s ease;
    width: 100%;
    min-height: 92px;
    box-shadow: var(--shadow-card);
    position: relative;
    overflow: hidden;
    animation: card-enter 0.35s cubic-bezier(0.16, 1, 0.3, 1) backwards;
  }
  @keyframes card-enter {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card:hover {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-card-hover);
    transform: translateY(-1px);
  }
  .card:active { transform: translateY(0) scale(0.995); }
  .card.full { opacity: 0.55; }
  .card.full:hover { transform: none; box-shadow: var(--shadow-card); }

  .card-info {
    flex: 1;
    min-width: 0;
  }
  .card-name {
    font-size: 15.5px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    line-height: 1.3;
    margin-bottom: 6px;
    letter-spacing: -0.012em;
  }
  .card-meta {
    font-size: 12.5px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    font-weight: 500;
  }
  .meta-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--text-faint);
    flex-shrink: 0;
  }
  .agency-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 5px;
    background: var(--surface-2);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .card-lots {
    text-align: right;
    flex-shrink: 0;
    min-width: 56px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }
  .lots-pill {
    display: inline-flex;
    align-items: baseline;
    gap: 4px;
  }
  .lots-num {
    font-size: 38px;
    font-weight: 700;
    line-height: 1;
    transition: color 0.3s;
    font-variant-numeric: tabular-nums;
    font-feature-settings: 'tnum';
    letter-spacing: -0.04em;
  }
  .lots-num.green { color: var(--green); }
  .lots-num.amber { color: var(--amber); }
  .lots-num.red { color: var(--red); }
  .lots-num.grey { color: var(--grey); }
  .lots-label {
    font-size: 10.5px;
    color: var(--text-faint);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }

  /* Status indicator dot */
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-bottom: 5px;
  }
  .status-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .status-dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .status-dot.grey { background: var(--grey); }

  /* ============================================================
     States
     ============================================================ */
  .state-msg {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 24px;
    color: var(--text-muted);
  }
  .state-msg .title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.015em;
  }
  .state-msg .sub { font-size: 14px; line-height: 1.55; max-width: 320px; }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s cubic-bezier(0.6, 0, 0.4, 1) infinite;
    margin-bottom: 22px;
  }

  .footer-note {
    font-size: 12px;
    color: var(--text-faint);
    text-align: center;
    margin: 8px 0 16px;
    font-weight: 500;
  }

  /* ============================================================
     Toast
     ============================================================ */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    z-index: 100;
    box-shadow: var(--shadow-popover);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Reduce motion preference */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
  <header class="header" id="header">
    <div class="header-row">
      <div class="brand">
        <span class="brand-mark">P</span>
        <span class="brand-text">ParkQuick</span><span class="brand-text-accent">SG</span>
      </div>
      <div class="header-actions">
        <button id="locationBtn" class="icon-btn" aria-label="Use my current location" title="Use my current location">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 2v3"></path><path d="M12 19v3"></path>
            <path d="M2 12h3"></path><path d="M19 12h3"></path>
          </svg>
        </button>
        <button id="themeToggle" class="icon-btn theme-toggle" aria-label="Toggle theme" title="Toggle theme">
          <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
          </svg>
          <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button id="refreshBtn" class="icon-btn" aria-label="Refresh now" title="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </button>
      </div>
    </div>
    <div class="updated-line" id="updatedLine">&nbsp;</div>
    <div class="countdown-bar"><div class="countdown-bar-fill" id="countdownFill"></div></div>
    <form class="search-bar" id="searchBar" autocomplete="off" role="combobox" aria-haspopup="listbox" aria-owns="suggestList" aria-expanded="false">
      <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="searchInput" type="text" placeholder="Search area or postal code" aria-label="Search area or postal code" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
        <button type="button" id="clearBtn" class="clear-btn" aria-label="Clear search" tabindex="-1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <ul id="suggestList" class="suggest-list" role="listbox"></ul>
    </form>
  </header>

  <div id="locationPill" class="location-pill" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
      <circle cx="12" cy="10" r="3"></circle>
    </svg>
    <span id="locationText">Near you</span>
  </div>

  <div id="banner"></div>
  <div id="content"></div>
  <div id="footerNote" class="footer-note"></div>
  <div id="toast" class="toast"></div>

<script>
(() => {
  'use strict';

  const REFRESH_MS = 60_000;
  const GEO_TIMEOUT_MS = 8_000;
  const NEAR_RADIUS_M = 2_000;
  const FAR_RADIUS_M = 5_000;
  const MAX_RESULTS = 10;
  const MIN_RESULTS_BEFORE_EXPAND = 5;

  const state = {
    position: null,
    locationLabel: null,
    carparks: [],
    fetchedAt: 0,
    stale: false,
    refreshTimer: null,
    countdownTimer: null,
    lastRefreshAt: 0,
    inFlight: false,
    cardEls: new Map(),
    suggestions: [],
  };

  const $ = (id) => document.getElementById(id);
  const els = {
    content: $('content'),
    banner: $('banner'),
    footerNote: $('footerNote'),
    updatedLine: $('updatedLine'),
    countdownFill: $('countdownFill'),
    locationPill: $('locationPill'),
    locationText: $('locationText'),
    locationBtn: $('locationBtn'),
    refreshBtn: $('refreshBtn'),
    themeToggle: $('themeToggle'),
    header: $('header'),
    searchBar: $('searchBar'),
    searchInput: $('searchInput'),
    suggestList: $('suggestList'),
    clearBtn: $('clearBtn'),
    toast: $('toast'),
  };

  let suggestController = null;
  let suggestTimer = null;
  let activeSuggestIdx = -1;

  // ---------- helpers ----------
  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) ** 2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLng/2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function formatDistance(m) {
    if (m < 1000) return `${Math.round(m / 10) * 10}m`;
    return `${(m / 1000).toFixed(1)}km`;
  }

  function lotColor(lots) {
    if (lots === 0) return 'grey';
    if (lots <= 4) return 'red';
    if (lots <= 20) return 'amber';
    return 'green';
  }

  function titleCase(s) {
    if (!s) return '';
    return s.toLowerCase().replace(/\b\w/g, (c) => c.toUpperCase());
  }

  function parseLocation(loc) {
    if (!loc || typeof loc !== 'string') return null;
    const parts = loc.trim().split(/\s+/);
    if (parts.length !== 2) return null;
    const lat = parseFloat(parts[0]);
    const lng = parseFloat(parts[1]);
    if (!isFinite(lat) || !isFinite(lng)) return null;
    return { lat, lng };
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function showToast(msg, ms = 1800) {
    els.toast.textContent = msg;
    els.toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => els.toast.classList.remove('show'), ms);
  }

  function setBanner(msg) {
    els.banner.innerHTML = msg ? `<div class="banner">${msg}</div>` : '';
  }

  // ---------- aggregation (car lots only) ----------
  function aggregate(records) {
    const groups = new Map();
    for (const r of records) {
      if (r.LotType !== 'C') continue; // car lots only
      const id = r.CarParkID;
      if (!id) continue;
      const coords = parseLocation(r.Location);
      if (!coords) continue;
      groups.set(id, {
        id,
        name: r.Development || id,
        area: r.Area || '',
        agency: r.Agency || '',
        lat: coords.lat,
        lng: coords.lng,
        lots: parseInt(r.AvailableLots, 10) || 0,
      });
    }
    return Array.from(groups.values());
  }

  // ---------- list building ----------
  function buildList() {
    if (!state.position) return null;
    const groups = aggregate(state.carparks);
    const enriched = groups.map((g) => ({
      ...g,
      dist: haversine(state.position.lat, state.position.lng, g.lat, g.lng),
    }));

    enriched.sort((a, b) => {
      const aZero = a.lots === 0 ? 1 : 0;
      const bZero = b.lots === 0 ? 1 : 0;
      if (aZero !== bZero) return aZero - bZero;
      if (Math.abs(a.dist - b.dist) > 50) return a.dist - b.dist;
      return b.lots - a.lots;
    });

    let radius = NEAR_RADIUS_M;
    let nearby = enriched.filter((c) => c.dist <= radius);
    if (nearby.length < MIN_RESULTS_BEFORE_EXPAND) {
      radius = FAR_RADIUS_M;
      nearby = enriched.filter((c) => c.dist <= radius);
    }
    return { items: nearby.slice(0, MAX_RESULTS), radius, total: enriched.length };
  }

  function makeCard(c) {
    const card = document.createElement('button');
    card.className = 'card';
    card.dataset.id = c.id;
    card.innerHTML = `
      <div class="card-info">
        <div class="card-name"></div>
        <div class="card-meta">
          <span class="dist"></span>
          <span class="meta-dot"></span>
          <span class="agency-badge"></span>
        </div>
      </div>
      <div class="card-lots">
        <div class="status-dot"></div>
        <div class="lots-num"></div>
        <div class="lots-label">lots</div>
      </div>
    `;
    card.addEventListener('click', () => {
      const url = `https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lng}&travelmode=driving`;
      window.open(url, '_blank', 'noopener');
    });
    return card;
  }

  function updateCard(card, c) {
    card.querySelector('.card-name').textContent = titleCase(c.name);
    card.querySelector('.dist').textContent = formatDistance(c.dist);
    const agency = card.querySelector('.agency-badge');
    agency.textContent = c.agency || '';
    agency.style.display = c.agency ? '' : 'none';
    const dot = card.querySelector('.meta-dot');
    dot.style.display = c.agency ? '' : 'none';
    const color = lotColor(c.lots);
    const lotsEl = card.querySelector('.lots-num');
    const statusDot = card.querySelector('.status-dot');
    const prev = lotsEl.textContent;
    const newText = String(c.lots);
    lotsEl.textContent = newText;
    lotsEl.className = `lots-num ${color}`;
    statusDot.className = `status-dot ${color}`;
    card.classList.toggle('full', c.lots === 0);
    if (prev && prev !== newText) {
      lotsEl.style.opacity = '0.4';
      requestAnimationFrame(() => { lotsEl.style.transition = 'opacity 0.4s'; lotsEl.style.opacity = '1'; });
    }
  }

  function render() {
    if (!state.position) return;
    const result = buildList();
    if (!result) return;
    const { items, radius, total } = result;

    if (items.length === 0) {
      state.cardEls.clear();
      els.content.innerHTML = `
        <div class="state-msg">
          <div class="title">No carparks found nearby</div>
          <div class="sub">${total === 0 ? 'No car carparks match your filter.' : 'Try searching by area instead.'}</div>
        </div>`;
      els.footerNote.textContent = '';
      return;
    }

    let list = els.content.querySelector('.list');
    if (!list) {
      els.content.innerHTML = '<div class="list"></div>';
      list = els.content.querySelector('.list');
      state.cardEls.clear();
    }

    const seen = new Set();
    items.forEach((c, idx) => {
      seen.add(c.id);
      let card = state.cardEls.get(c.id);
      const isNew = !card;
      if (isNew) {
        card = makeCard(c);
        card.style.animationDelay = `${Math.min(idx * 25, 200)}ms`;
        state.cardEls.set(c.id, card);
      }
      updateCard(card, c);
      const expectedNode = list.children[idx];
      if (expectedNode !== card) {
        list.insertBefore(card, expectedNode || null);
      }
    });
    for (const [id, el] of state.cardEls) {
      if (!seen.has(id)) {
        el.remove();
        state.cardEls.delete(id);
      }
    }

    const radiusKm = radius / 1000;
    els.footerNote.textContent = `Showing ${items.length} of ${total} carparks within ${radiusKm}km`;

    if (!state.locationLabel) {
      const nearestArea = items[0]?.area;
      els.locationText.innerHTML = nearestArea
        ? `Near <strong>${escapeHtml(titleCase(nearestArea))}</strong>`
        : 'Near you';
    } else {
      els.locationText.innerHTML = `Near <strong>${escapeHtml(state.locationLabel)}</strong>`;
    }
    els.locationPill.style.display = '';
  }

  // ---------- updated / countdown ----------
  function tickUpdated() {
    if (!state.fetchedAt) return;
    const ageS = Math.floor((Date.now() - state.fetchedAt) / 1000);
    const stale = state.stale ? ' · using cached data' : '';
    els.updatedLine.innerHTML = `<span class="pulse-dot"></span>Updated ${ageS}s ago${stale}`;
    const elapsed = Date.now() - state.lastRefreshAt;
    const remaining = Math.max(0, 1 - elapsed / REFRESH_MS);
    els.countdownFill.style.transform = `scaleX(${remaining})`;
  }

  // ---------- network ----------
  async function loadCarparks({ silent = false } = {}) {
    if (state.inFlight) return;
    state.inFlight = true;
    els.refreshBtn.classList.add('spinning');
    try {
      const res = await fetch('/api/carparks');
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const json = await res.json();
      state.carparks = json.data || [];
      state.fetchedAt = json.fetchedAt ? Date.parse(json.fetchedAt) : Date.now();
      state.stale = !!json.stale;
      state.lastRefreshAt = Date.now();
      setBanner(state.stale ? 'Data may be outdated — LTA service is unreachable.' : '');
      render();
      tickUpdated();
      if (!silent) showToast('Updated');
    } catch (err) {
      console.error('loadCarparks failed:', err);
      if (state.carparks.length === 0) {
        els.content.innerHTML = `
          <div class="state-msg">
            <div class="title">Couldn't load carparks</div>
            <div class="sub">${escapeHtml(err.message)}<br><br>Tap refresh to try again.</div>
          </div>`;
      } else {
        showToast('Refresh failed');
      }
    } finally {
      state.inFlight = false;
      setTimeout(() => els.refreshBtn.classList.remove('spinning'), 300);
    }
  }

  async function geocode(query, signal) {
    const res = await fetch(`/api/geocode?q=${encodeURIComponent(query)}`, { signal });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error || `Geocoding failed (${res.status})`);
    }
    return res.json();
  }

  // ---------- suggestions ----------
  function renderSuggestions(results, query) {
    activeSuggestIdx = -1;
    if (!results || results.length === 0) {
      if (query && query.length >= 2) {
        els.suggestList.innerHTML = `<li class="suggest-item empty">No matches for "${escapeHtml(query)}"</li>`;
        els.suggestList.classList.add('open');
        els.searchBar.setAttribute('aria-expanded', 'true');
      } else {
        closeSuggestions();
      }
      return;
    }
    els.suggestList.innerHTML = results.map((r, i) => `
      <li class="suggest-item" role="option" data-idx="${i}">
        ${escapeHtml(r.label)}
        ${r.address && r.address !== r.label ? `<span class="sub">${escapeHtml(r.address)}</span>` : ''}
      </li>
    `).join('');
    els.suggestList.classList.add('open');
    els.searchBar.setAttribute('aria-expanded', 'true');
    state.suggestions = results;
  }

  function closeSuggestions() {
    els.suggestList.classList.remove('open');
    els.suggestList.innerHTML = '';
    els.searchBar.setAttribute('aria-expanded', 'false');
    activeSuggestIdx = -1;
    state.suggestions = [];
  }

  function highlightSuggestion(idx) {
    const items = els.suggestList.querySelectorAll('.suggest-item:not(.empty)');
    items.forEach((el, i) => el.classList.toggle('active', i === idx));
    if (idx >= 0 && items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
    activeSuggestIdx = idx;
  }

  async function fetchSuggestions(q) {
    if (suggestController) suggestController.abort();
    suggestController = new AbortController();
    try {
      const json = await geocode(q, suggestController.signal);
      renderSuggestions(json.results || [], q);
    } catch (err) {
      if (err.name === 'AbortError') return;
      console.error('suggest failed:', err);
    }
  }

  function onSearchInput() {
    const q = els.searchInput.value.trim();
    els.clearBtn.classList.toggle('show', q.length > 0);
    if (suggestTimer) clearTimeout(suggestTimer);
    if (q.length < 2) { closeSuggestions(); return; }
    suggestTimer = setTimeout(() => fetchSuggestions(q), 220);
  }

  async function pickSuggestion(result) {
    closeSuggestions();
    els.searchInput.value = result.label;
    els.searchInput.blur();
    state.position = { lat: result.lat, lng: result.lng };
    state.locationLabel = result.label;
    els.locationBtn.classList.remove('active-loc');
    state.cardEls.clear();
    showLoading(`Loading carparks near ${escapeHtml(result.label)}…`);
    await loadCarparks({ silent: true });
    startAutoRefresh();
  }

  // ---------- flow ----------
  function showLoading(message = 'Finding your location…') {
    els.content.innerHTML = `
      <div class="state-msg">
        <div class="spinner"></div>
        <div class="title">${message}</div>
      </div>`;
  }

  function showFallbackPrompt(reason) {
    els.content.innerHTML = `
      <div class="state-msg">
        <div class="title">Search for an area or postal code</div>
        <div class="sub">${reason || 'Type above to find carparks anywhere in Singapore.'}</div>
      </div>`;
    setTimeout(() => els.searchInput.focus(), 50);
  }

  async function handleSearchSubmit(e) {
    e.preventDefault();
    if (activeSuggestIdx >= 0 && state.suggestions[activeSuggestIdx]) {
      pickSuggestion(state.suggestions[activeSuggestIdx]);
      return;
    }
    const q = els.searchInput.value.trim();
    if (!q) return;
    if (state.suggestions && state.suggestions.length > 0) {
      pickSuggestion(state.suggestions[0]);
      return;
    }
    showLoading(`Looking up "${escapeHtml(q)}"…`);
    try {
      const json = await geocode(q);
      const first = (json.results || [])[0];
      if (!first) throw new Error('No matching location found');
      pickSuggestion(first);
    } catch (err) {
      els.content.innerHTML = `
        <div class="state-msg">
          <div class="title">Couldn't find "${escapeHtml(q)}"</div>
          <div class="sub">${escapeHtml(err.message)}<br><br>Try a different area name or postal code.</div>
        </div>`;
      els.searchInput.focus();
    }
  }

  function clearSearch() {
    els.searchInput.value = '';
    els.clearBtn.classList.remove('show');
    closeSuggestions();
    els.searchInput.focus();
  }

  async function reCenterOnUser() {
    if (!navigator.geolocation) {
      showToast('Geolocation not available');
      return;
    }
    showToast('Locating…');
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        state.position = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        state.locationLabel = null;
        els.locationBtn.classList.add('active-loc');
        els.searchInput.value = '';
        els.clearBtn.classList.remove('show');
        state.cardEls.clear();
        showLoading('Finding carparks near you…');
        await loadCarparks({ silent: true });
        startAutoRefresh();
      },
      (err) => {
        showToast(err.code === err.PERMISSION_DENIED ? 'Location permission denied' : 'Location unavailable');
      },
      { timeout: GEO_TIMEOUT_MS, maximumAge: 30000, enableHighAccuracy: false }
    );
  }

  function startAutoRefresh() {
    if (state.refreshTimer) clearInterval(state.refreshTimer);
    if (state.countdownTimer) clearInterval(state.countdownTimer);
    state.refreshTimer = setInterval(() => loadCarparks({ silent: true }), REFRESH_MS);
    state.countdownTimer = setInterval(tickUpdated, 1000);
    tickUpdated();
  }

  function startWithGeolocation() {
    if (!navigator.geolocation) {
      showFallbackPrompt('Geolocation is not supported in this browser.');
      return;
    }
    showLoading();
    let resolved = false;
    const timeout = setTimeout(() => {
      if (resolved) return;
      resolved = true;
      showFallbackPrompt('Location took too long. Search by area instead.');
    }, GEO_TIMEOUT_MS + 500);

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        if (resolved) return;
        resolved = true;
        clearTimeout(timeout);
        state.position = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        els.locationBtn.classList.add('active-loc');
        await loadCarparks({ silent: true });
        startAutoRefresh();
      },
      (err) => {
        if (resolved) return;
        resolved = true;
        clearTimeout(timeout);
        if (err.code === err.PERMISSION_DENIED) {
          showFallbackPrompt('Search by area or postal code below.');
        } else {
          showFallbackPrompt('Couldn’t detect location. Search by area instead.');
        }
      },
      { timeout: GEO_TIMEOUT_MS, maximumAge: 60000, enableHighAccuracy: false }
    );
  }

  // ---------- theme ----------
  function applyTheme(theme) {
    document.documentElement.dataset.theme = theme;
    try { localStorage.setItem('pq-theme', theme); } catch {}
    const meta = document.querySelector(`meta[name="theme-color"]`);
    if (meta) meta.setAttribute('content', theme === 'dark' ? '#09090b' : '#fafafa');
  }
  function toggleTheme() {
    const current = document.documentElement.dataset.theme || 'dark';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }

  // ---------- wire up ----------
  els.refreshBtn.addEventListener('click', () => {
    if (!state.position) return;
    state.lastRefreshAt = Date.now();
    loadCarparks();
  });
  els.locationBtn.addEventListener('click', reCenterOnUser);
  els.themeToggle.addEventListener('click', toggleTheme);
  els.searchBar.addEventListener('submit', handleSearchSubmit);
  els.searchInput.addEventListener('input', onSearchInput);
  els.searchInput.addEventListener('focus', () => {
    if (els.searchInput.value.trim().length >= 2 && state.suggestions?.length) {
      els.suggestList.classList.add('open');
    }
  });
  els.searchInput.addEventListener('keydown', (e) => {
    const items = els.suggestList.querySelectorAll('.suggest-item:not(.empty)');
    if (e.key === 'ArrowDown') {
      if (items.length === 0) return;
      e.preventDefault();
      highlightSuggestion(Math.min(activeSuggestIdx + 1, items.length - 1));
    } else if (e.key === 'ArrowUp') {
      if (items.length === 0) return;
      e.preventDefault();
      highlightSuggestion(Math.max(activeSuggestIdx - 1, 0));
    } else if (e.key === 'Escape') {
      closeSuggestions();
    }
  });
  els.suggestList.addEventListener('click', (e) => {
    const item = e.target.closest('.suggest-item:not(.empty)');
    if (!item) return;
    const idx = parseInt(item.dataset.idx, 10);
    const result = state.suggestions[idx];
    if (result) pickSuggestion(result);
  });
  els.clearBtn.addEventListener('click', clearSearch);
  document.addEventListener('click', (e) => {
    if (!els.searchBar.contains(e.target)) closeSuggestions();
  });

  // Header shadow on scroll
  let lastScroll = 0;
  window.addEventListener('scroll', () => {
    const s = window.scrollY;
    els.header.classList.toggle('scrolled', s > 4);
    lastScroll = s;
  }, { passive: true });

  // Listen for OS theme changes (only if user hasn't explicitly set one)
  try {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem('pq-theme')) {
        applyTheme(e.matches ? 'dark' : 'light');
      }
    });
  } catch {}

  const isLikelyMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  if (!isLikelyMobile && !window.isSecureContext) {
    showFallbackPrompt('Search for an area or postal code to begin.');
  } else {
    startWithGeolocation();
  }
})();
</script>
</body>
</html>
