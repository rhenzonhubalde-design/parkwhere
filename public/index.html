  /* ============================================================
     Reset + base
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {

    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

  /* Stripe-style mesh gradient: layered radial blobs, fixed to viewport */

  [data-theme="dark"] .theme-toggle .sun { opacity: 1; transform: rotate(0deg) scale(1); }
  [data-theme="dark"] .theme-toggle .moon { opacity: 0; transform: rotate(-90deg) scale(0.5); }
  [data-theme="light"] .theme-toggle .sun { opacity: 0; transform: rotate(90deg) scale(0.5); }

    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }

  /* Status indicator dot */
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-bottom: 5px;
  }
  .status-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .status-dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .status-dot.grey { background: var(--grey); }

  /* ============================================================
     Card occupancy progress bar (4px strip at card bottom)
     ============================================================ */
  .card-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--surface-2);
    border-radius: 0 0 16px 16px;
    overflow: hidden;
  }
  .card-bar-fill {
    height: 100%;
    transition: width 0.55s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.3s;
  }
  .card-bar-fill.green { background: var(--green); }
  .card-bar-fill.amber { background: var(--amber); }
  .card-bar-fill.red   { background: var(--red); }
  .card-bar-fill.grey  { background: var(--grey); }

  /* ============================================================
     Carpark rates (expandable section on card)
     ============================================================ */
  .card-top { display: flex; align-items: center; gap: 16px; width: 100%; }
  .ev-specs {
    display: flex; flex-direction: column; gap: 3px;
    margin-top: 7px; font-size: 12px; font-weight: 500;
    color: var(--text-muted); line-height: 1.35;
  }
  .ev-specs span { display: block; }
  .occ-pct { font-weight: 600; font-variant-numeric: tabular-nums; }
  .occ-pct.green { color: var(--green); }
  .occ-pct.amber { color: var(--amber); }
  .occ-pct.red   { color: var(--red); }
  .occ-pct.grey  { color: var(--text-muted); }
  .card-rates {
    width: 100%; margin-top: 12px; padding-top: 11px;
    border-top: 1px solid var(--border);
  }
  .rates-row {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; user-select: none;
    font-size: 12.5px; font-weight: 600; color: var(--text-muted);
  }
  .rates-row:hover { color: var(--text); }
  .rates-row .rates-money { color: var(--text); font-weight: 700; }
  .rates-sep {
    width: 3px; height: 3px; border-radius: 50%;
    background: var(--text-faint); flex-shrink: 0;
  }
  .rates-free {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 999px;
    background: var(--green-soft); color: var(--green);
    font-size: 11px; font-weight: 700; letter-spacing: 0.01em;
  }
  .rates-free svg { width: 11px; height: 11px; stroke-width: 2.5; }
  .rates-warn {
    color: var(--amber); cursor: help; flex-shrink: 0;
    display: inline-flex; align-items: center;
  }
  .rates-warn svg { width: 13px; height: 13px; stroke-width: 2; }
  .rates-chev {
    margin-left: auto; flex-shrink: 0; color: var(--text-faint);
    transition: transform 0.2s ease; display: inline-flex;
  }
  .rates-chev svg { width: 15px; height: 15px; stroke-width: 2.5; }
  .card-rates.open .rates-chev { transform: rotate(90deg); }
  .rates-detail {
    display: none; margin-top: 10px;
    font-size: 12.5px; color: var(--text-muted);
  }
  .card-rates.open .rates-detail { display: block; }
  .rates-line {
    display: flex; gap: 12px; padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }
  .rates-line:last-child { border-bottom: none; }
  .rates-line .rk {
    flex-shrink: 0; width: 78px; color: var(--text-faint);
    font-weight: 600; text-transform: uppercase;
    font-size: 10.5px; letter-spacing: 0.05em; padding-top: 1px;
  }
  .rates-line .rv {
    flex: 1; color: var(--text); font-weight: 500; line-height: 1.45;
  }
  .rates-line .rv.free-hl { color: var(--green); font-weight: 600; }
  .rates-line.is-today .rk { color: var(--accent); }
  .rates-line.is-today .rv { color: var(--text); font-weight: 600; }
  .rates-today {
    display: inline-block; margin-left: 8px; vertical-align: middle;
    padding: 1px 7px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent);
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .rates-note {
    margin-top: 8px; font-size: 11px; font-style: italic;
    color: var(--text-faint); line-height: 1.4;
  }

  /* ============================================================
     ERP sub-tabs (Route Planner / ERP Rates)
     ============================================================ */
  .subtab-bar {
    display: flex; gap: 6px; margin: 14px 0 2px; padding: 4px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: var(--shadow-card);
  }
  .subtab-btn {
    flex: 1; padding: 9px 6px; font-size: 13px; font-weight: 600;
    color: var(--text-muted); border-radius: 9px; background: transparent;
    transition: color .15s, background .15s; letter-spacing: -0.01em;
  }
  .subtab-btn.active { color: var(--text); background: var(--surface-2); border: 1px solid var(--border-strong); }
  .subtab-btn:hover:not(.active) { color: var(--text); }

  /* ERP Rates view */
  .erp-now {
    margin: 14px 0 0; padding: 16px 16px 14px; border-radius: 14px;
    background: var(--surface); border: 1px solid var(--border);
    box-shadow: var(--shadow-card);
  }
  .erp-now.free { background: var(--green-soft); border-color: color-mix(in srgb, var(--green) 24%, transparent); }
  .erp-now-head {
    display: flex; align-items: center; gap: 8px; font-size: 13px;
    font-weight: 700; color: var(--text); margin-bottom: 2px;
  }
  .erp-now-head svg { width: 15px; height: 15px; stroke-width: 2; }
  .erp-now.free .erp-now-head { color: var(--green); }
  .erp-now-sub { font-size: 11.5px; color: var(--text-muted); font-weight: 500; margin-bottom: 10px; }
  .erp-now-row {
    display: flex; align-items: flex-start; gap: 10px; padding: 7px 0;
    border-top: 1px solid var(--border); font-size: 13px;
  }
  .erp-now-row .enr-z {
    font-weight: 600; color: var(--text); flex: 1; min-width: 0;
    overflow-wrap: anywhere;
  }
  .erp-now-row .enr-z small {
    display: block; color: var(--text-muted); font-weight: 500;
    margin-top: 1px; line-height: 1.35;
  }
  .erp-now-row .enr-amt {
    font-weight: 800; color: var(--amber); font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .erp-rates-search {
    margin: 14px 0 0; display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    box-shadow: var(--shadow-card);
  }
  .erp-rates-search svg { width: 16px; height: 16px; stroke-width: 2; color: var(--text-faint); flex-shrink: 0; }
  .erp-rates-search input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: inherit; font-size: 14px; font-weight: 500;
  }
  .erp-rates-search input::placeholder { color: var(--text-faint); }
  .xway-row {
    display: flex; align-items: center; gap: 12px; width: 100%;
    margin-top: 8px; padding: 14px 16px; text-align: left;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: var(--shadow-card);
    transition: border-color .15s, transform .1s;
  }
  .xway-row:hover { border-color: var(--border-strong); }
  .xway-row:active { transform: scale(0.995); }
  .xway-abbr {
    font-size: 15px; font-weight: 800; color: var(--accent);
    letter-spacing: -0.02em; flex-shrink: 0; min-width: 42px;
  }
  .xway-info { flex: 1; min-width: 0; overflow-wrap: anywhere; }
  .xway-name { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  .xway-meta { font-size: 11.5px; color: var(--text-muted); font-weight: 500; margin-top: 2px; }
  .xway-chev { color: var(--text-faint); flex-shrink: 0; }
  .xway-chev svg { width: 16px; height: 16px; stroke-width: 2.5; }

  .erp-back {
    display: inline-flex; align-items: center; gap: 6px; margin: 14px 0 0;
    font-size: 13px; font-weight: 600; color: var(--text-muted);
  }
  .erp-back svg { width: 15px; height: 15px; stroke-width: 2.5; }
  .erp-back:hover { color: var(--text); }
  .erp-rt-head { margin: 10px 0 0; font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
  .erp-rt-sub { font-size: 12.5px; color: var(--text-muted); font-weight: 500; margin-top: 3px; }
  .erp-toggles { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0 0; }
  .erp-toggle-group { display: flex; flex-wrap: wrap; gap: 4px; padding: 4px; background: var(--surface-2); border-radius: 9px; }
  .erp-tg-btn {
    padding: 6px 12px; font-size: 12px; font-weight: 600; border-radius: 7px;
    color: var(--text-muted); transition: background .15s, color .15s;
    white-space: nowrap;
  }
  .erp-tg-btn.active { background: var(--accent-soft); color: var(--accent); }
  .erp-zone {
    margin: 16px 0 0; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; box-shadow: var(--shadow-card); overflow: hidden;
  }
  .erp-zone-h {
    padding: 12px 16px; background: var(--surface-2);
    font-size: 12px; font-weight: 700; color: var(--text);
    letter-spacing: 0.01em; border-bottom: 1px solid var(--border);
    overflow-wrap: anywhere; line-height: 1.4;
  }
  .erp-zone-h small { display: block; color: var(--text-muted); font-weight: 500; margin-top: 2px; font-size: 11px; overflow-wrap: anywhere; }
  .erp-slot {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    font-size: 13.5px; border-top: 1px solid var(--border);
  }
  .erp-slot:first-child { border-top: none; }
  .erp-slot .es-time { flex: 1; color: var(--text-muted); font-weight: 500; font-variant-numeric: tabular-nums; }
  .erp-slot .es-amt { font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .erp-slot.active {
    background: var(--green-soft);
    border-left: 3px solid var(--green); padding-left: 13px;
  }
  .erp-slot.active .es-time { color: var(--green); font-weight: 700; }
  .erp-slot.active .es-amt { color: var(--green); }
  .erp-slot .es-now {
    font-size: 10px; font-weight: 700; color: var(--green);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .erp-free-msg {
    margin: 16px 0 0; padding: 18px 16px; text-align: center;
    background: var(--green-soft); border: 1px solid color-mix(in srgb, var(--green) 22%, transparent);
    border-radius: 14px; color: var(--green); font-size: 13.5px; font-weight: 600;
  }

  /* ============================================================
     Trip tab — form
     ============================================================ */
  .trip-form {
    margin: 12px 0 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 18px 14px;
    box-shadow: var(--shadow-card);
  }
  .trip-row {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 34px;
    position: relative;
  }
  .trip-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .trip-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .trip-dot.red   { background: var(--red);   box-shadow: 0 0 6px var(--red); }
  .trip-origin-label {
    font-size: 14px; color: var(--text-muted); font-weight: 500;
  }
  .trip-line {
    width: 2px; height: 16px; background: var(--border);
    margin: 3px 0 3px 4px; border-radius: 2px;
  }
  .trip-dest-input {
    flex: 1; background: transparent; border: none;
    color: var(--text); font-family: inherit; font-size: 14px;
    font-weight: 500; padding: 0; outline: none; letter-spacing: -0.01em;
  }
  .trip-dest-input::placeholder { color: var(--text-faint); }
  .trip-gps-btn {
    flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 7px;
    color: var(--accent); background: var(--accent-soft); cursor: pointer;
    transition: background .15s;
  }
  .trip-gps-btn:hover { background: color-mix(in srgb, var(--accent) 24%, transparent); }
  .trip-gps-btn svg { width: 14px; height: 14px; }
  .trip-actions {
    display: flex; flex-direction: column;
    gap: 10px; margin-top: 14px;
    padding-top: 14px; border-top: 1px solid var(--border);
  }
  .vehicle-tabs { display: flex; gap: 5px; }
  .vehicle-btn {
    flex: 1; padding: 8px 6px; border-radius: 8px; font-size: 12.5px;
    font-weight: 600; color: var(--text-muted); background: var(--surface-2);
    transition: background 0.15s, color 0.15s;
    border: 1px solid transparent; white-space: nowrap;
  }
  .vehicle-btn.active {
    background: var(--accent-soft); color: var(--accent);
    border-color: color-mix(in srgb, var(--accent) 30%, transparent);
  }
  .vehicle-btn:hover:not(.active) { background: var(--surface-3); color: var(--text); }
  .get-dir-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; padding: 11px 18px; background: var(--accent-strong); color: white;
    border-radius: 10px; font-size: 14px; font-weight: 600;
    transition: background 0.15s, transform 0.1s, opacity 0.15s;
  }
  .get-dir-btn svg { width: 14px; height: 14px; stroke-width: 2.5; }
  .get-dir-btn:hover:not(:disabled) { background: var(--accent); }
  .get-dir-btn:active:not(:disabled) { transform: scale(0.97); }
  .get-dir-btn:disabled { opacity: 0.38; cursor: default; }

  /* ============================================================
     Trip tab — route cards
     ============================================================ */
  .route-card {
    display: flex; flex-direction: column; gap: 12px;
    padding: 16px 18px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 16px;
    box-shadow: var(--shadow-card); text-align: left; width: 100%;
    transition: border-color 0.15s, box-shadow 0.2s;
    animation: card-enter 0.35s cubic-bezier(0.16, 1, 0.3, 1) backwards;
  }
  .route-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-card-hover); }
  .route-header {
    display: flex; align-items: center; gap: 10px;
  }
  .route-badge {
    font-size: 10.5px; font-weight: 700; padding: 3px 8px;
    border-radius: 6px; text-transform: uppercase; letter-spacing: 0.07em;
    flex-shrink: 0;
  }
  .route-badge.fastest { background: var(--green-soft); color: var(--green); }
  .route-badge.alt     { background: var(--surface-2);  color: var(--text-muted); }
  .route-summary {
    flex: 1; font-size: 14.5px; font-weight: 600; color: var(--text);
    letter-spacing: -0.012em; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis;
  }
  .nav-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 12px; background: var(--accent-soft); color: var(--accent);
    border-radius: 8px; font-size: 12.5px; font-weight: 600;
    text-decoration: none; transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .nav-btn svg { width: 12px; height: 12px; stroke-width: 2.5; }
  .nav-btn:hover { background: var(--accent); color: white; }
  .route-stats { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .route-time {
    font-size: 28px; font-weight: 700; color: var(--text);
    letter-spacing: -0.04em; font-variant-numeric: tabular-nums;
  }
  .route-dist { font-size: 13.5px; color: var(--text-muted); font-weight: 500; }
  .route-stats-right {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .route-save {
    font-size: 12px; font-weight: 700;
    color: var(--green); background: var(--green-soft);
    padding: 3px 9px; border-radius: 999px;
  }
  .route-erp-total {
    display: flex; flex-direction: column; align-items: flex-end;
    line-height: 1.05;
  }
  .route-erp-total .ret-amt {
    font-size: 21px; font-weight: 800; color: var(--amber);
    letter-spacing: -0.03em; font-variant-numeric: tabular-nums;
  }
  .route-erp-total.free .ret-amt { color: var(--green); }
  .route-erp-total .ret-lbl {
    font-size: 9.5px; font-weight: 700; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.07em; margin-top: 1px;
  }
  .route-erp {
    display: flex; flex-direction: column; gap: 6px; font-size: 12.5px;
    font-weight: 500; padding: 10px 12px; border-radius: 9px;
  }
  .route-erp svg { width: 13px; height: 13px; flex-shrink: 0; }
  .route-erp.ok {
    color: var(--green);
    background: var(--green-soft);
    border: 1px solid color-mix(in srgb, var(--green) 20%, transparent);
  }
  /* single-line "No ERP" pill only — the breakdown stays column */
  .route-erp.pill { flex-direction: row; align-items: center; }
  .route-erp.warn {
    color: var(--amber); background: var(--amber-soft);
    border: 1px solid color-mix(in srgb, var(--amber) 22%, transparent);
  }
  .route-erp .erp-top {
    display: flex; align-items: center; gap: 8px;
    font-size: 13.5px; color: var(--text);
  }
  .route-erp .erp-top strong { font-weight: 700; }
  .route-erp .erp-sub {
    color: var(--text-muted); font-weight: 500; font-size: 11.5px;
  }
  .route-erp .erp-top .erp-sub { margin-left: auto; }
  .erp-line {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--text); font-size: 12.5px; font-weight: 600;
    padding: 4px 0 4px 21px; gap: 10px; overflow: hidden;
  }
  .erp-line.free { color: var(--text-muted); font-weight: 500; }
  .erp-line .erp-g { flex: 1; min-width: 0; overflow-wrap: anywhere; }
  .erp-line .erp-g .erp-gname {
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; line-height: 1.3;
  }
  .erp-line .erp-g .erp-gname b { font-weight: 800; }
  .erp-line .erp-g .erp-arr {
    display: block; font-size: 11px; font-weight: 500;
    color: var(--text-faint); margin-top: 2px; overflow-wrap: anywhere;
  }
  .erp-line .erp-amt { flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .erp-line.free .erp-amt::after {
    content: ' ✓ free'; font-size: 10.5px; color: var(--green); font-weight: 600;
  }
  .erp-line.charged .erp-amt { color: var(--amber); font-weight: 800; }
  .erp-foot {
    font-size: 11px; color: var(--text-muted); font-weight: 500;
    padding-left: 21px; font-style: italic;
  }
  .erp-noalt {
    text-align: center; font-size: 12.5px; color: var(--text-muted);
    font-weight: 500; margin: 12px 0 4px; padding: 10px 14px;
    background: var(--surface-2); border-radius: 10px;
    border: 1px solid var(--border);
  }
  .erp-meta {
    text-align: center; font-size: 11.5px; color: var(--text-faint);
    font-weight: 500; margin: 8px 0;
  }
  .erp-meta a { color: var(--accent); text-decoration: none; }
  .erp-meta a:hover { text-decoration: underline; }

  /* ============================================================
     Traffic cameras
     ============================================================ */
  .cam-section { margin: 22px 0 4px; }
  .cam-section-head {
    display: flex; align-items: center; gap: 7px;
    font-size: 13px; font-weight: 700; color: var(--text);
    letter-spacing: -0.01em; margin: 0 2px 10px;
  }
  .cam-section-head svg { width: 15px; height: 15px; stroke-width: 2; color: var(--accent); }
  .cam-section-head .cam-loc { color: var(--text-muted); font-weight: 600; }
  .cam-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-card);
    width: 100%; text-align: left; display: block;
  }
  .cam-card:hover { border-color: var(--border-strong); }
  .cam-img-wrap {
    position: relative; width: 100%; height: 168px;
    background: var(--surface-2); overflow: hidden;
  }
  .cam-img-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .cam-skel {
    position: absolute; inset: 0;
    background: linear-gradient(100deg,
      var(--surface-2) 30%, var(--surface-3) 50%, var(--surface-2) 70%);
    background-size: 200% 100%;
    animation: cam-shimmer 1.3s ease-in-out infinite;
  }
  @keyframes cam-shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .cam-fallback {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 8px; color: var(--text-faint);
    font-size: 12px; font-weight: 500;
  }
  .cam-fallback svg { width: 26px; height: 26px; stroke-width: 1.6; }
  .cam-meta { padding: 10px 12px; }
  .cam-name {
    font-size: 13px; font-weight: 600; color: var(--text);
    letter-spacing: -0.01em; line-height: 1.35;
    display: flex; align-items: flex-start; gap: 6px;
  }
  .cam-name svg { width: 13px; height: 13px; stroke-width: 2; flex-shrink: 0; margin-top: 2px; color: var(--accent); }
  .cam-sub {
    font-size: 11.5px; color: var(--text-muted); font-weight: 500;
    margin-top: 3px; padding-left: 19px;
  }
  .cam-sub .dot {

<script>
(() => {
  'use strict';

  const REFRESH_MS = 60_000;
  const GEO_TIMEOUT_MS = 8_000;
  const NEAR_RADIUS_M = 2_000;
  const FAR_RADIUS_M = 5_000;
  const INCIDENT_RADIUS_M = 5_000;
  const MAX_RESULTS = 10;
  const MIN_RESULTS_BEFORE_EXPAND = 5;

  const state = {
    view: 'parking',          // 'parking' | 'traffic' | 'ev' | 'trip'
    position: null,
    locationLabel: null,
    userGps: null,            // real device location (never overwritten by search)
    userGpsLabel: null,       // reverse-geocoded label for userGps
    carparks: [],
    carparkMeta: { hdb: {}, publicHolidays: [], ltaRates: {} },
    ratesExpanded: new Set(),   // carpark ids with the rates section open
    incidents: [],
    cameras: [],
    camerasFetchedAt: 0,
    ev: [],
    privateParks: [],
    tripDest: null,
    tripOrigin: null,           // free-text origin override; null = device GPS / searched position
    tripVehicle: 'car',
    routes: [],
    erpMeta: null,
    tripInFlight: false,
    tripSubView: 'planner',     // 'planner' | 'rates'  (WS6)
    erpRates: null,             // erp-rates.json
    erpZoneMap: null,           // erp-zone-map.json
    erpDayType: null,           // 'weekday' | 'sat' | 'sunph' (auto, user-overridable)
    erpXway: null,              // selected expressway abbr, or null = list
    erpSearch: '',
    recentLocations: [],        // WS7
    fetchedAt: 0,
    stale: false,
    refreshTimer: null,
    countdownTimer: null,
    lastRefreshAt: 0,
    inFlight: false,
    cardEls: new Map(),
    suggestions: [],
  };

  const $ = (id) => document.getElementById(id);
  const els = {
    content: $('content'),
    banner: $('banner'),
    footerNote: $('footerNote'),
    updatedLine: $('updatedLine'),
    countdownFill: $('countdownFill'),
    locationPill: $('locationPill'),
    locationText: $('locationText'),
    pillClear: $('pillClear'),
    locationBtn: $('locationBtn'),
    refreshBtn: $('refreshBtn'),
    themeToggle: $('themeToggle'),
    header: $('header'),
    searchBar: $('searchBar'),
    searchInput: $('searchInput'),
    suggestList: $('suggestList'),
    clearBtn: $('clearBtn'),
    toast: $('toast'),
    segControl: $('segControl'),
    segIndicator: $('segIndicator'),
    trafficCount: $('trafficCount'),
    evCount: $('evCount'),
    camLightbox: $('camLightbox'),
    camLbClose: $('camLbClose'),
    camLbImg: $('camLbImg'),
    camLbCap: $('camLbCap'),
    camLbSub: $('camLbSub'),
  };

  let suggestController = null;
  let suggestTimer = null;
  let activeSuggestIdx = -1;

  // Trip-specific module-level vars
  let tripSuggestions = [];
  let tripSugIdx = -1;
  let tripSugTimer = null;
  let tripSugCtrl = null;
  // Origin-input autocomplete (Route Planner free-text start point)
  let originSuggestions = [];
  let originSugIdx = -1;
  let originSugTimer = null;
  let originSugCtrl = null;

  // ---------- helpers ----------
  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) ** 2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLng/2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function formatDistance(m) {
    if (m < 1000) return `${Math.round(m / 10) * 10}m`;
    return `${(m / 1000).toFixed(1)}km`;
  }

  function lotColor(lots) {
    if (lots === 0) return 'grey';
    if (lots <= 4) return 'red';
    if (lots <= 20) return 'amber';
    return 'green';
  }
  // Occupancy-driven colour for the "% full" bar/label: the closer to 100%,
  // the redder. Distinct from lotColor() (which is an absolute scarcity
  // warning for the big lot count).
  function occColor(pctFull) {
    if (pctFull >= 95) return 'red';
    if (pctFull >= 75) return 'amber';
    return 'green';
  }

  function titleCase(s) {
    if (!s) return '';
    return s.toLowerCase().replace(/\b\w/g, (c) => c.toUpperCase());
  }

  function parseLocation(loc) {
    if (!loc || typeof loc !== 'string') return null;
    const parts = loc.trim().split(/\s+/);
    if (parts.length !== 2) return null;
    const lat = parseFloat(parts[0]);
    const lng = parseFloat(parts[1]);
    if (!isFinite(lat) || !isFinite(lng)) return null;
    return { lat, lng };
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function showToast(msg, ms = 1800) {
    els.toast.textContent = msg;
    els.toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => els.toast.classList.remove('show'), ms);
  }

  function setBanner(msg) {
    els.banner.innerHTML = msg ? `<div class="banner">${msg}</div>` : '';
  }

  // ============================================================
  //  Parking rates (Workstream 5)
  // ============================================================
  const FREE_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
  const WARN_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`;
  const CHEV_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`;

  // Singapore-local now, regardless of device timezone.
  function sgNow() {
    const f = new Intl.DateTimeFormat('en-GB', {
      timeZone: 'Asia/Singapore', weekday: 'short',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', hour12: false,
    });
    const p = Object.fromEntries(f.formatToParts(new Date()).map((x) => [x.type, x.value]));
    return {
      ymd: `${p.year}-${p.month}-${p.day}`,
      dow: p.weekday,                                  // 'Sun', 'Mon', …
      mins: (parseInt(p.hour, 10) % 24) * 60 + parseInt(p.minute, 10),
    };
  }
  function isPublicHoliday(ymd) {
    return (state.carparkMeta.publicHolidays || []).includes(ymd);
  }

  // "7AM-10.30PM" / "1PM-10.30PM" → { from: mins, to: mins }  (null if unparseable)
  function parseFreeWindow(str) {
    if (!str) return null;
    const m = String(str).toUpperCase().match(
      /(\d{1,2})(?:[.:](\d{2}))?\s*(AM|PM)\s*-\s*(\d{1,2})(?:[.:](\d{2}))?\s*(AM|PM)/);
    if (!m) return null;
    const to24 = (h, mm, ap) => {
      h = parseInt(h, 10) % 12;
      if (ap === 'PM') h += 12;
      return h * 60 + (parseInt(mm, 10) || 0);
    };
    return { from: to24(m[1], m[2], m[3]), to: to24(m[4], m[5], m[6]) };
  }

  // HDB: free parking applies Sun & PH within the carpark's stated window.
  function isHdbFreeNow(freeParkingStr) {
    if (!freeParkingStr || /^NO$/i.test(freeParkingStr.trim())) return false;
    const t = sgNow();
    if (t.dow !== 'Sun' && !isPublicHoliday(t.ymd)) return false;
    const w = parseFreeWindow(freeParkingStr);
    if (!w) return false;
    return w.from <= w.to
      ? t.mins >= w.from && t.mins <= w.to
      : t.mins >= w.from || t.mins <= w.to;   // window crossing midnight
  }

  // Pull a glanceable "$X.XX/hr" or "$X.XX/30min" from a free-text rate string.
  function headlineRate(str) {
    if (!str) return null;
    const money = str.match(/\$\s?\d+(?:\.\d{1,2})?/);
    if (!money) return null;
    const amt = money[0].replace(/\s/g, '');
    if (/30\s?min|½\s?hr|1\/2\s?hr|30\s?mins/i.test(str)) return `${amt}/30min`;
    if (/15\s?min/i.test(str)) return `${amt}/15min`;
    if (/per\s?hr|1st\s?hr|\/\s?hr|per hour|1st hour/i.test(str)) return `${amt}/hr`;
    if (/per\s?entry/i.test(str)) return `${amt}/entry`;
    return amt;
  }

  function titleCaseShort(s) {
    return s ? s.toLowerCase().replace(/\b\w/g, (c) => c.toUpperCase()) : '';
  }

  // Which tariff applies *today* in Singapore: 'weekday' | 'sat' | 'sunph'.
  function todayType() {
    const t = sgNow();
    if (t.dow === 'Sun' || isPublicHoliday(t.ymd)) return 'sunph';
    if (t.dow === 'Sat') return 'sat';
    return 'weekday';
  }
  function todayLabel() {
    const t = sgNow();
    if (isPublicHoliday(t.ymd)) return 'Public holiday';
    if (t.dow === 'Sun') return 'Sunday';
    if (t.dow === 'Sat') return 'Saturday';
    return 'Weekday';
  }
  // Resolve "Same as Saturday/weekday" cross-references in free-text rates.
  function resolveRef(str, weekday, sat) {
    let s = (str || '').trim();
    for (let i = 0; i < 4 && s; i++) {
      if (/^same as weekday/i.test(s)) s = (weekday || '').trim();
      else if (/^same as sat/i.test(s)) s = (sat || '').trim();
      else break;
    }
    return s;
  }
  // The rate string that actually applies today (with refs resolved).
  function effectiveRateStr(weekday, sat, sunph, tt) {
    if (tt === 'weekday') return weekday || '';
    if (tt === 'sat') return resolveRef(sat, weekday, sat) || weekday || '';
    return resolveRef(sunph, weekday, sat)
        || resolveRef(sat, weekday, sat) || weekday || '';
  }

  // Build a unified rates descriptor for a carpark, or null if no data.
  // { headline, dayLabel, freeNow, warn, lines:[{k,v,free}], note }
  function resolveRates(c) {
    const tt = todayType();
    const dayLabel = todayLabel();
    // --- HDB: standardised policy + per-carpark metadata ---
    if (c.agency === 'HDB') {
      const m = state.carparkMeta.hdb[c.id];
      if (!m) return null;
      const freeNow = isHdbFreeNow(m.freeParking);
      const hasFree = m.freeParking && !/^NO$/i.test(m.freeParking.trim());
      const w = hasFree ? parseFreeWindow(m.freeParking) : null;
      const fmt = (mins) => {
        let h = Math.floor(mins / 60), mm = mins % 60;
        const ap = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${h}${mm ? '.' + String(mm).padStart(2, '0') : ''}${ap}`;
      };
      const sunVal = w
        ? `Free ${fmt(w.from)}–${fmt(w.to)}`
        : '$0.60 / 30 min';
      const hours = !m.shortTerm || /^NO$/i.test(m.shortTerm)
        ? 'No short-term parking'
        : titleCaseShort(m.shortTerm);
      const lines = [
        { k: 'Weekdays', v: '$0.60 / 30 min (car) · $1.20 / 30 min (heavy)', today: tt === 'weekday' },
        { k: 'Saturday', v: '$0.60 / 30 min', today: tt === 'sat' },
        { k: 'Sun & PH', v: sunVal, free: !!w, today: tt === 'sunph' },
        { k: 'Night', v: /^YES$/i.test(m.nightParking) ? 'Yes' : 'No' },
      ];
      if (m.gantryHeight && parseFloat(m.gantryHeight) > 0)
        lines.push({ k: 'Gantry', v: `${m.gantryHeight}m` });
      lines.push({ k: 'Hours', v: hours });
      if (m.parkingSystem) lines.push({ k: 'System', v: titleCaseShort(m.parkingSystem) });
      // Headline = the rate that applies right now.
      const headline = (tt === 'sunph' && freeNow) ? 'Free now' : '$0.60/30min';
      return {
        headline,
        dayLabel,
        freeNow, warn: false, lines,
        note: 'HDB short-term parking · 10-min grace period.',
      };
    }

    // --- URA: free-text rate strings, displayed verbatim ---
    if (c.uraRates) {
      const r = c.uraRates;
      if (!r.weekday && !r.saturday && !r.sunPH) return null;
      const lines = [];
      if (r.weekday)  lines.push({ k: 'Weekdays', v: r.weekday, today: tt === 'weekday' });
      if (r.saturday) lines.push({ k: 'Saturday', v: r.saturday, today: tt === 'sat' });
      if (r.sunPH)    lines.push({ k: 'Sun & PH', v: r.sunPH, today: tt === 'sunph' });
      if (r.startTime && r.endTime)
        lines.push({ k: 'Hours', v: `${r.startTime}–${r.endTime}` });
      if (r.parkingSystem) lines.push({ k: 'System', v: titleCaseShort(r.parkingSystem) });
      const eff = effectiveRateStr(r.weekday, r.saturday, r.sunPH, tt);
      const isFree = /^free$/i.test(eff);
      return {
        headline: isFree ? 'Free now' : (headlineRate(eff) || 'See rates'),
        dayLabel, freeNow: isFree, warn: false, lines, note: '',
      };
    }

    // --- Private mall seed (LTA CSV, 2018 — unverified) ---
    if (c.isPrivate && (c.weekdayRate || c.saturdayRate || c.sunPHRate)) {
      const lines = [];
      if (c.weekdayRate)  lines.push({ k: 'Weekdays', v: c.weekdayRate, today: tt === 'weekday' });
      if (c.saturdayRate) lines.push({ k: 'Saturday', v: c.saturdayRate, today: tt === 'sat' });
      if (c.sunPHRate)    lines.push({ k: 'Sun & PH', v: c.sunPHRate, today: tt === 'sunph' });
      const unverified = c.ratesVerified === false;
      const eff = effectiveRateStr(c.weekdayRate, c.saturdayRate, c.sunPHRate, tt);
      return {
        headline: headlineRate(eff) || 'See rates',
        dayLabel, freeNow: false, warn: unverified, lines,
        note: unverified
          ? `Rates from ${c.ratesLastChecked || '2018'} — may have changed. Verify at the carpark.`
          : '',
      };
    }

    // --- LTA / URA live carparks matched to the LTA Rates CSV by name ---
    // (malls, attractions, hotels — 2018 data, always shown unverified)
    const lr = lookupLtaRates(c.name);
    if (lr) {
      const lines = [];
      if (lr.weekday)  lines.push({ k: 'Weekdays', v: lr.weekday, today: tt === 'weekday' });
      if (lr.saturday) lines.push({ k: 'Saturday', v: lr.saturday, today: tt === 'sat' });
      if (lr.sunPH)    lines.push({ k: 'Sun & PH', v: lr.sunPH, today: tt === 'sunph' });
      if (!lines.length) return null;
      const eff = effectiveRateStr(lr.weekday, lr.saturday, lr.sunPH, tt);
      return {
        headline: headlineRate(eff) || 'See rates',
        dayLabel, freeNow: false, warn: true, lines,
        note: 'Rates from 2018 — may have changed. Verify at the carpark.',
      };
    }

    return null;
  }

  // Match a live carpark's development name to an LTA Rates CSV row.
  const ratesNorm = (s) => (s || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  function lookupLtaRates(name) {
    const map = state.carparkMeta.ltaRates;
    if (!map) return null;
    const fn = ratesNorm(name);
    if (fn.length < 4) return null;
    if (map[fn]) return map[fn];
    // Prefix match either way (e.g. "VivoCity P2" → "vivocity"),
    // length-guarded to avoid spurious hits.
    for (const k in map) {
      if (k.length >= 5 && fn.length >= 5 && (fn.startsWith(k) || k.startsWith(fn))) {
        return map[k];
      }
    }
    return null;
  }

  // ---------- aggregation (car lots only) ----------
  function aggregate(records) {
    const groups = new Map();
    for (const r of records) {
      if (r.LotType !== 'C') continue; // car lots only
      const id = r.CarParkID;
      if (!id) continue;
      const coords = parseLocation(r.Location);
      if (!coords) continue;
      groups.set(id, {
        id,
        name: r.Development || id,
        area: r.Area || '',
        agency: r.Agency || '',
        lat: coords.lat,
        lng: coords.lng,
        lots: parseInt(r.AvailableLots, 10) || 0,
        total: parseInt(r.TotalLots, 10) || 0,
        uraRates: r.Rates || null,
      });
    }
    return Array.from(groups.values());
  }

  // ---------- list building ----------
  function buildList() {
    if (!state.position) return null;
    const groups = aggregate(state.carparks);

    // Merge in private (static seed) carparks
    const privItems = (state.privateParks || []).map((p) => ({
      id: p.id,
      name: p.name,
      area: '',
      agency: 'Private',
      lat: p.lat,
      lng: p.lng,
      lots: null,    // no live data
      total: 0,
      isPrivate: true,
      weekdayRate: p.weekdayRate || '',
      saturdayRate: p.saturdayRate || '',
      sunPHRate: p.sunPHRate || '',
      ratesVerified: p.ratesVerified,
      ratesLastChecked: p.ratesLastChecked || '',
    }));

    const all = [...groups, ...privItems];
    const enriched = all.map((g) => ({
      ...g,
      dist: haversine(state.position.lat, state.position.lng, g.lat, g.lng),
    }));

    enriched.sort((a, b) => {
      // Deprioritise full or no-data carparks
      const aDeprio = (a.lots === 0 || a.lots == null) ? 1 : 0;
      const bDeprio = (b.lots === 0 || b.lots == null) ? 1 : 0;
      if (aDeprio !== bDeprio) return aDeprio - bDeprio;
      if (Math.abs(a.dist - b.dist) > 50) return a.dist - b.dist;
      return (b.lots ?? 0) - (a.lots ?? 0);
    });

    let radius = NEAR_RADIUS_M;
    let nearby = enriched.filter((c) => c.dist <= radius);
    // Expand radius if too few *public* results (private parks don't count toward minimum)
    if (nearby.filter((c) => !c.isPrivate).length < MIN_RESULTS_BEFORE_EXPAND) {
      radius = FAR_RADIUS_M;
      nearby = enriched.filter((c) => c.dist <= radius);
    }
    return { items: nearby.slice(0, MAX_RESULTS), radius, total: enriched.length };
  }

  function makeCard(c) {
    const card = document.createElement('button');
    card.className = 'card';
    card.dataset.id = c.id;
    card.innerHTML = `
      <div class="card-top">
        <div class="card-info">
          <div class="card-name"></div>
          <div class="card-meta">
            <span class="dist"></span>
            <span class="meta-dot"></span>
            <span class="agency-badge"></span>
            <span class="meta-dot occ-dot" hidden></span>
            <span class="occ-pct" hidden></span>
          </div>
        </div>
        <div class="card-lots">
          <div class="status-dot"></div>
          <div class="lots-num"></div>
          <div class="lots-label">lots</div>
        </div>
      </div>
      <div class="card-rates" hidden></div>
      <div class="card-bar"><div class="card-bar-fill"></div></div>
    `;
    card.addEventListener('click', (e) => {
      // Taps inside the rates section toggle it — never navigate.
      if (e.target.closest('.card-rates')) return;
      const url = `https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lng}&travelmode=driving`;
      window.open(url, '_blank', 'noopener');
    });
    const ratesEl = card.querySelector('.card-rates');
    ratesEl.addEventListener('click', (e) => {
      if (!e.target.closest('.rates-row')) return;
      e.stopPropagation();
      const open = ratesEl.classList.toggle('open');
      if (open) state.ratesExpanded.add(c.id);
      else state.ratesExpanded.delete(c.id);
    });
    return card;
  }

  function updateCard(card, c) {
    card.querySelector('.card-name').textContent = titleCase(c.name);
    card.querySelector('.dist').textContent = formatDistance(c.dist);
    const agency = card.querySelector('.agency-badge');
    agency.textContent = c.agency || '';
    agency.style.display = c.agency ? '' : 'none';
    const dot = card.querySelector('.meta-dot');
    dot.style.display = c.agency ? '' : 'none';
    // Progress bar + "% full" — needs a real total. The LTA feed omits
    // capacity; HDB capacity comes from carpark-meta, URA from its API.
    const hdbMeta = c.agency === 'HDB' ? state.carparkMeta.hdb[c.id] : null;
    const total = (hdbMeta && hdbMeta.totalLots) || c.total || 0;
    const haveOccupancy = c.lots != null && total > 0;
    // Derive ONE severity colour used by all three indicators (lots number,
    // progress bar, "% full" label) so they always agree.
    // When a total is known we colour by percentage (occColor); without a
    // total we fall back to the absolute-scarcity scale (lotColor).
    let cls, fullPct = 0;
    if (haveOccupancy) {
      const availPct = Math.max(0, Math.min(100, Math.round((c.lots / total) * 100)));
      fullPct = 100 - availPct;
      cls = occColor(fullPct);
    } else {
      cls = c.lots == null ? 'grey' : lotColor(c.lots);
    }
    const lotsEl = card.querySelector('.lots-num');
    const statusDot = card.querySelector('.status-dot');
    const prev = lotsEl.textContent;
    const newText = c.lots == null ? '–' : String(c.lots);
    lotsEl.textContent = newText;
    lotsEl.className = `lots-num ${cls}`;
    statusDot.className = `status-dot ${cls}`;
    card.classList.toggle('full', c.lots === 0);
    if (prev && prev !== newText && c.lots != null) {
      lotsEl.style.opacity = '0.4';
      requestAnimationFrame(() => { lotsEl.style.transition = 'opacity 0.4s'; lotsEl.style.opacity = '1'; });
    }
    const bar = card.querySelector('.card-bar');
    const barFill = card.querySelector('.card-bar-fill');
    const occDot = card.querySelector('.occ-dot');
    const occPct = card.querySelector('.occ-pct');
    if (haveOccupancy) {
      if (barFill) {
        barFill.style.width = `${fullPct}%`;
        barFill.className = `card-bar-fill ${cls}`;
      }
      if (bar) bar.style.display = '';
      if (occDot) occDot.hidden = false;
      if (occPct) {
        occPct.hidden = false;
        occPct.textContent = `${fullPct}% full`;
        occPct.className = `occ-pct ${cls}`;
      }
    } else {
      // No capacity data → a permanently-empty 4px strip is just noise.
      if (bar) bar.style.display = 'none';
      if (occDot) occDot.hidden = true;
      if (occPct) occPct.hidden = true;
    }

    // ---- Rates section (Workstream 5) ----
    const ratesEl = card.querySelector('.card-rates');
    if (ratesEl) {
      const r = resolveRates(c);
      if (!r) {
        ratesEl.hidden = true;
        ratesEl.innerHTML = '';
        ratesEl.classList.remove('open');
      } else {
        ratesEl.hidden = false;
        const isOpen = state.ratesExpanded.has(c.id);
        ratesEl.classList.toggle('open', isOpen);
        const freeBadge = r.freeNow
          ? `<span class="rates-free">${FREE_ICON}Free now</span>`
          : '';
        const warnBadge = r.warn
          ? `<span class="rates-warn" title="Rates from ${escapeHtml(c.ratesLastChecked || '2018')} — may have changed. Verify at the carpark.">${WARN_ICON}</span>`
          : '';
        // Show which day's tariff this is — unless the "Free now" badge
        // already says it.
        const sub = (r.dayLabel && !r.freeNow)
          ? `<span class="rates-sep"></span><span>${escapeHtml(r.dayLabel)} rate</span>`
          : '';
        const rows = r.lines.map((ln) => {
          const cls = (ln.free ? ' free-hl' : '') ;
          const todayTag = ln.today ? '<span class="rates-today">Today</span>' : '';
          return `<div class="rates-line${ln.today ? ' is-today' : ''}"><span class="rk">${escapeHtml(ln.k)}</span><span class="rv${cls}">${escapeHtml(ln.v)}${todayTag}</span></div>`;
        }).join('');
        const note = r.note ? `<div class="rates-note">${escapeHtml(r.note)}</div>` : '';
        ratesEl.innerHTML = `
          <div class="rates-row">
            <span class="rates-money">${escapeHtml(r.headline)}</span>
            ${freeBadge}${warnBadge}${sub}
            <span class="rates-chev">${CHEV_ICON}</span>
          </div>
          <div class="rates-detail">${rows}${note}</div>`;
      }
    }
  }

  function render() {
    if (!state.position) return;
    const result = buildList();
    if (!result) return;
    const { items, radius, total } = result;

    // 1.1 Private carpark disclaimer: show when search is active and public results are sparse
    if (!state.stale) {
      const publicCount = items.filter((i) => !i.isPrivate).length;
      if (state.locationLabel && publicCount < 3) {
        setBanner(
          'Some carparks (e.g. Jewel Changi, ION Orchard) are privately managed and won\'t appear in public data. ' +
          'Check the mall website or try <a href="https://www.ura.gov.sg/maps/parkinglots" target="_blank" rel="noopener" ' +
          'style="color:inherit;font-weight:600;text-decoration:underline;">URA Maps</a>.'
        );
      } else {
        setBanner('');
      }
    }

    if (items.length === 0) {
      state.cardEls.clear();
      els.content.innerHTML = `
        <div class="state-msg">
          <div class="title">No carparks found nearby</div>
          <div class="sub">${total === 0 ? 'No car carparks match your filter.' : 'Try searching by area instead.'}</div>
        </div>`;
      els.footerNote.textContent = '';
      return;
    }

    let list = els.content.querySelector('.list');
    if (!list) {
      els.content.innerHTML = '<div class="list"></div>';
      list = els.content.querySelector('.list');
      state.cardEls.clear();
    }

    const seen = new Set();
    items.forEach((c, idx) => {
      seen.add(c.id);
      let card = state.cardEls.get(c.id);
      const isNew = !card;
      if (isNew) {
        card = makeCard(c);
        card.style.animationDelay = `${Math.min(idx * 25, 200)}ms`;
        state.cardEls.set(c.id, card);
      }
      updateCard(card, c);
      const expectedNode = list.children[idx];
      if (expectedNode !== card) {
        list.insertBefore(card, expectedNode || null);
      }
    });
    for (const [id, el] of state.cardEls) {
      if (!seen.has(id)) {
        el.remove();
        state.cardEls.delete(id);
      }
    }

    const radiusKm = radius / 1000;
    els.footerNote.textContent = `Showing ${items.length} of ${total} carparks within ${radiusKm}km`;

    if (!state.locationLabel) {
      const nearestArea = items[0]?.area;
      els.locationText.innerHTML = nearestArea
        ? `Near <strong>${escapeHtml(titleCase(nearestArea))}</strong>`
        : 'Near you';
    } else {
      els.locationText.innerHTML = `Near <strong>${escapeHtml(state.locationLabel)}</strong>`;
    }
    els.locationPill.style.display = '';
  }

  // ---------- updated / countdown ----------
  function tickUpdated() {
    if (!state.fetchedAt) return;
    const ageS = Math.floor((Date.now() - state.fetchedAt) / 1000);
    const stale = state.stale ? ' · using cached data' : '';
    els.updatedLine.innerHTML = `<span class="pulse-dot"></span>Updated ${ageS}s ago${stale}`;
    const elapsed = Date.now() - state.lastRefreshAt;
    const remaining = Math.max(0, 1 - elapsed / REFRESH_MS);
    els.countdownFill.style.transform = `scaleX(${remaining})`;
  }

  // ---------- network ----------
  async function loadCarparks({ silent = false } = {}) {
    if (state.inFlight) return;
    state.inFlight = true;
    els.refreshBtn.classList.add('spinning');
    try {
      const res = await fetch('/api/carparks');
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const json = await res.json();
      state.carparks = json.data || [];
      state.fetchedAt = json.fetchedAt ? Date.parse(json.fetchedAt) : Date.now();
      state.stale = !!json.stale;
      state.lastRefreshAt = Date.now();
      setBanner(state.stale ? 'Data may be outdated — LTA service is unreachable.' : '');
      render();
      tickUpdated();
      if (!silent) showToast('Updated');
      // Lazy-retry carpark metadata if the startup fetch missed (e.g. a
      // transient upstream rate-limit) — rate rows fill in once it lands.
      if (!Object.keys(state.carparkMeta.hdb).length
          || !Object.keys(state.carparkMeta.ltaRates).length) loadCarparkMeta();
    } catch (err) {
      console.error('loadCarparks failed:', err);
      if (state.carparks.length === 0) {
        els.content.innerHTML = `
          <div class="state-msg">
            <div class="title">Couldn't load carparks</div>
            <div class="sub">${escapeHtml(err.message)}<br><br>Tap refresh to try again.</div>
          </div>`;
      } else {
        showToast('Refresh failed');
      }
    } finally {
      state.inFlight = false;
      setTimeout(() => els.refreshBtn.classList.remove('spinning'), 300);
    }
  }

  // ---------- traffic incidents ----------
  const INCIDENT_ICONS = {
    alert: '<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line>',
    cone: '<path d="M9.5 4 5 20h14L14.5 4z"></path><line x1="3" y1="20" x2="21" y2="20"></line><line x1="8" y1="13" x2="16" y2="13"></line>',
    car: '<path d="M5 17h14M6.5 17l1-5h9l1 5M8 12l1-4h6l1 4"></path><circle cx="8" cy="17.5" r="1.6"></circle><circle cx="16" cy="17.5" r="1.6"></circle>',
    arrows: '<polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path>',
    info: '<circle cx="12" cy="12" r="9"></circle><line x1="12" y1="11" x2="12" y2="16"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>',
  };

  function incidentMeta(type) {
    const t = (type || '').toLowerCase();
    if (t.includes('accident')) return { icon: 'alert', color: 'red' };
    if (t.includes('road block') || t.includes('roadblock')) return { icon: 'alert', color: 'red' };
    if (t.includes('roadwork') || t.includes('road work') || t.includes('plant') || t.includes('equipment')) return { icon: 'cone', color: 'amber' };
    if (t.includes('breakdown') || t.includes('vehicle')) return { icon: 'car', color: 'amber' };
    if (t.includes('heavy traffic') || t.includes('obstacle')) return { icon: 'alert', color: 'amber' };
    if (t.includes('diversion')) return { icon: 'arrows', color: 'accent' };
    return { icon: 'info', color: 'grey' };
  }

  // Parse "(18/5)13:53 Accident on ..." -> { time, text }
  function parseIncidentMsg(msg) {
    const m = String(msg || '').match(/^\((\d{1,2})\/(\d{1,2})\)\s*(\d{1,2}:\d{2})\s*(.*)$/s);
    if (!m) return { time: '', text: String(msg || '') };
    return { time: m[3], date: `${m[1]}/${m[2]}`, text: m[4].trim() };
  }

  // ============================================================
  //  Traffic cameras (Workstream 4)
  // ============================================================
  let camLocations = null;          // { id: "label" } lazy-loaded once
  let camLocationsPromise = null;

  function loadCameraLocations() {
    if (camLocations) return Promise.resolve(camLocations);
    if (camLocationsPromise) return camLocationsPromise;
    camLocationsPromise = fetch('/data/camera-locations.json')
      .then((r) => r.json())
      .then((j) => { camLocations = (j && j.locations) || {}; return camLocations; })
      .catch(() => { camLocations = {}; return camLocations; });
    return camLocationsPromise;
  }

  function cameraLabel(cam) {
    // Server resolves curated overrides + reverse-geocoded road names into
    // cam.Location; camLocations is a last-resort client fallback.
    const l = cam.Location || (camLocations && camLocations[cam.CameraID]);
    if (l) return l;
    return `${cam.Latitude.toFixed(4)}, ${cam.Longitude.toFixed(4)}`;
  }

  function timeAgo(ms) {
    if (!ms) return '';
    const s = Math.max(0, Math.round((Date.now() - ms) / 1000));
    if (s < 45) return 'just now';
    const m = Math.round(s / 60);
    if (m < 1) return 'just now';
    if (m === 1) return '1 min ago';
    if (m < 60) return `${m} min ago`;
    const h = Math.round(m / 60);
    return h === 1 ? '1 hr ago' : `${h} hrs ago`;
  }

  const CAM_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>`;
  const CAM_PIN = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>`;

  // ≤1 km from any sampled point of a route polyline
  function camerasNearPath(path, maxM = 1000) {
    if (!Array.isArray(path) || !path.length || !state.cameras.length) return [];
    const out = [];
    for (const cam of state.cameras) {
      let best = Infinity;
      for (const [lat, lng] of path) {
        const d = haversine(lat, lng, cam.Latitude, cam.Longitude);
        if (d < best) best = d;
        if (best <= maxM) break;
      }
      if (best <= maxM) out.push({ ...cam, distance: best });
    }
    return out.sort((a, b) => a.distance - b.distance);
  }

  function getNearestCameras(lat, lng, count = 3) {
    return state.cameras
      .map((c) => ({ ...c, distance: haversine(lat, lng, c.Latitude, c.Longitude) }))
      .sort((a, b) => a.distance - b.distance)
      .slice(0, count);
  }

  // Renders one camera card. variant '' (full) or 'strip'.
  function cameraCardHtml(cam) {
    const name = cameraLabel(cam);
    const distStr = cam.distance != null ? formatDistance(cam.distance) + ' away' : '';
    const updated = timeAgo(state.camerasFetchedAt);
    const sub = [distStr, updated ? 'Updated ' + updated : '']
      .filter(Boolean)
      .map((p, i) => (i ? '<span class="dot"></span>' : '') + escapeHtml(p))
      .join('');
    return `
      <button class="cam-card" data-cam-id="${escapeHtml(cam.CameraID)}"
              data-cam-name="${escapeHtml(name)}" data-cam-src="${escapeHtml(cam.ImageLink)}">
        <span class="cam-img-wrap">
          <span class="cam-skel"></span>
          <img loading="lazy" src="${escapeHtml(cam.ImageLink)}" alt="${escapeHtml(name)}"
               onload="window.__camOK(this)" onerror="window.__camFail(this)" />
        </span>
        <span class="cam-meta">
          <span class="cam-name">${CAM_PIN}<span>${escapeHtml(name)}</span></span>
          ${sub ? `<span class="cam-sub">${sub}</span>` : ''}
        </span>
      </button>`;
  }
  window.__camOK = (img) => {
    const skel = img.parentElement && img.parentElement.querySelector('.cam-skel');
    if (skel) skel.remove();
  };
  window.__camFail = (img) => {
    img.style.display = 'none';
    const wrap = img.parentElement;
    if (!wrap || wrap.querySelector('.cam-fallback')) return;
    const skel = wrap.querySelector('.cam-skel');
    if (skel) skel.remove();
    const fb = document.createElement('span');
    fb.className = 'cam-fallback';
    fb.innerHTML = CAM_ICON + '<span>Image unavailable</span>';
    wrap.appendChild(fb);
  };

  function openCamLightbox(src, name, sub) {
    els.camLbImg.src = src;
    els.camLbCap.textContent = name || '';
    els.camLbSub.textContent = sub || '';
    els.camLightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeCamLightbox() {
    els.camLightbox.classList.remove('open');
    els.camLbImg.src = '';
    document.body.style.overflow = '';
  }

  async function loadCameras({ silent = true } = {}) {
    try {
      await loadCameraLocations();
      const res = await fetch('/api/traffic-images');
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const json = await res.json();
      state.cameras = json.data || [];
      state.camerasFetchedAt = json.fetchedAt ? Date.parse(json.fetchedAt) : Date.now();
      if (state.view === 'traffic') renderTrafficCameras();
      if (state.view === 'trip' && state.routes.length) renderTripRoutes();
    } catch (err) {
      console.warn('loadCameras failed:', err.message);
      // Spec 4.7: fail silently — section is simply omitted.
    }
  }

  // Traffic tab — "Live Cameras Near [Location]" (3 nearest)
  function renderTrafficCameras() {
    const host = document.getElementById('trafficCameras');
    if (!host) return;
    const origin = state.position || state.userGps;
    if (!origin || !state.cameras.length) { host.innerHTML = ''; return; }
    const near = getNearestCameras(origin.lat, origin.lng, 3);
    if (!near.length) { host.innerHTML = ''; return; }
    const locName = state.locationLabel
      ? `<span class="cam-loc">${escapeHtml(state.locationLabel)}</span>`
      : '<span class="cam-loc">you</span>';
    host.innerHTML = `
      <div class="cam-section">
        <div class="cam-section-head">${CAM_ICON}<span>Live cameras near ${locName}</span></div>
        <div class="list">${near.map(cameraCardHtml).join('')}</div>
      </div>`;
  }

  const SEVERITY = { red: 0, amber: 1, accent: 2, grey: 3 };

  function buildIncidentList() {
    const list = (state.incidents || [])
      .filter((i) => isFinite(i.Latitude) && isFinite(i.Longitude))
      .map((i) => {
        const meta = incidentMeta(i.Type);
        const parsed = parseIncidentMsg(i.Message);
        const dist = state.position
          ? haversine(state.position.lat, state.position.lng, i.Latitude, i.Longitude)
          : null;
        return { ...i, meta, parsed, dist };
      })
      // 1.3 Tighten to 5km radius when position is known
      .filter((i) => i.dist == null || i.dist <= INCIDENT_RADIUS_M);

    list.sort((a, b) => {
      if (a.dist != null && b.dist != null) return a.dist - b.dist;
      const s = SEVERITY[a.meta.color] - SEVERITY[b.meta.color];
      if (s !== 0) return s;
      return 0;
    });
    return list;
  }

  function renderIncidents() {
    const items = buildIncidentList();
    els.trafficCount.style.display = items.length ? '' : 'none';
    els.trafficCount.textContent = items.length;

    if (items.length === 0) {
      els.content.innerHTML = `
        <div class="state-msg" style="padding:56px 24px">
          <div class="title">No active traffic incidents</div>
          <div class="sub">Roads are clear right now. This refreshes automatically.</div>
        </div>
        <div id="trafficCameras"></div>`;
      els.footerNote.textContent = '';
      els.locationPill.style.display = 'none';
      renderTrafficCameras();
      return;
    }

    const rows = items.map((it, idx) => {
      const distStr = it.dist != null ? formatDistance(it.dist) : '';
      const metaParts = [];
      if (it.parsed.time) metaParts.push(escapeHtml(it.parsed.time));
      if (distStr) metaParts.push(escapeHtml(distStr) + ' away');
      const metaHtml = metaParts
        .map((p, i) => (i ? '<span class="dot"></span>' : '') + `<span>${p}</span>`)
        .join('');
      return `
        <button class="incident-card" data-lat="${it.Latitude}" data-lng="${it.Longitude}"
                style="animation-delay:${Math.min(idx * 25, 200)}ms">
          <span class="incident-icon ${it.meta.color}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">${INCIDENT_ICONS[it.meta.icon]}</svg>
          </span>
          <span class="incident-body">
            <span class="incident-top">
              <span class="incident-type">${escapeHtml(it.Type || 'Incident')}</span>
            </span>
            <span class="incident-meta">${metaHtml}</span>
            <span class="incident-msg">${escapeHtml(it.parsed.text)}</span>
          </span>
        </button>`;
    }).join('');

    els.content.innerHTML = `<div class="list">${rows}</div><div id="trafficCameras"></div>`;
    renderTrafficCameras();
    els.footerNote.textContent = state.position
      ? `${items.length} incident${items.length === 1 ? '' : 's'} · nearest first`
      : `${items.length} incident${items.length === 1 ? '' : 's'} island-wide`;

    if (state.position) {
      const label = state.locationLabel
        ? `Near <strong>${escapeHtml(state.locationLabel)}</strong>`
        : 'Near you';
      els.locationText.innerHTML = label;
      els.locationPill.style.display = '';
    } else {
      els.locationPill.style.display = 'none';
    }
  }

  async function loadIncidents({ silent = false } = {}) {
    if (state.inFlight) return;
    state.inFlight = true;
    els.refreshBtn.classList.add('spinning');
    try {
      const res = await fetch('/api/incidents');
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const json = await res.json();
      state.incidents = json.data || [];
      updateTrafficBadge();
      if (state.view === 'traffic') {
        state.fetchedAt = json.fetchedAt ? Date.parse(json.fetchedAt) : Date.now();
        state.stale = !!json.stale;
        state.lastRefreshAt = Date.now();
        setBanner(state.stale ? 'Data may be outdated — LTA service is unreachable.' : '');
        renderIncidents();
        tickUpdated();
        if (!silent) showToast('Updated');
        loadCameras();        // refresh camera strip on same poll cycle
      }
    } catch (err) {
      console.error('loadIncidents failed:', err);
      if (state.view === 'traffic' && state.incidents.length === 0) {
        els.content.innerHTML = `
          <div class="state-msg">
            <div class="title">Couldn't load traffic data</div>
            <div class="sub">${escapeHtml(err.message)}<br><br>Tap refresh to try again.</div>
          </div>`;
      } else if (!silent) {
        showToast('Refresh failed');
      }
    } finally {
      state.inFlight = false;
      setTimeout(() => els.refreshBtn.classList.remove('spinning'), 300);
    }
  }

  // ---------- EV charging ----------
  function evColor(available, total) {
    if (total === 0 || available === 0) return 'grey';
    const ratio = available / total;
    if (ratio >= 0.5 || available > 4) return 'green';
    if (available >= 1) return 'amber';
    return 'grey';
  }

  function buildEVList() {
    if (!state.position) return [];
    const list = (state.ev || [])
      .filter((s) => isFinite(s.lat) && isFinite(s.lng))
      .map((s) => ({
        ...s,
        dist: haversine(state.position.lat, state.position.lng, s.lat, s.lng),
      }));
    list.sort((a, b) => {
      const aOk = a.available > 0 ? 0 : 1;
      const bOk = b.available > 0 ? 0 : 1;
      if (aOk !== bOk) return aOk - bOk;
      return a.dist - b.dist;
    });
    return list.slice(0, MAX_RESULTS);
  }

  function renderEV() {
    if (!state.position) {
      els.content.innerHTML = `
        <div class="state-msg">
          <div class="title">Find EV charging near you</div>
          <div class="sub">Use your location or search for a destination above.</div>
        </div>`;
      els.locationPill.style.display = 'none';
      els.footerNote.textContent = '';
      return;
    }
    const items = buildEVList();
    if (items.length === 0) {
      els.content.innerHTML = `
        <div class="state-msg">
          <div class="title">No EV chargers nearby</div>
          <div class="sub">Try searching a different area.</div>
        </div>`;
      els.footerNote.textContent = '';
      return;
    }

    const rows = items.map((s, idx) => {
      const color = evColor(s.available, s.total);
      // Strip company suffixes AND the punctuation they leave behind
      // (e.g. "SP MOBILITY PTE. LTD." → "SP Mobility", not "SP MOBILITY . .")
      const cleanOp = (raw) => {
        const s2 = String(raw || '')
          .replace(/\b(PTE|LTD|LLP|LIMITED|SERVICES|SINGAPORE|GROUP|ENERGY|HOLDINGS?)\b/gi, ' ')
          .replace(/[.,&]/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
        return s2 || String(raw || '').trim();
      };
      const op = s.operators[0]
        ? escapeHtml(titleCase(cleanOp(s.operators[0])))
        : 'EV Charging';
      const specLines = [];
      if (s.plugs.length) specLines.push(escapeHtml(s.plugs.join(' · ')));
      const pw = [];
      if (s.maxKw) pw.push(`${s.maxKw} kW`);
      // Always show a tariff token so every card has the same shape;
      // operators that don't publish a rate show "Rate varies" (never $0).
      const priceNum = parseFloat(s.price);
      pw.push(isFinite(priceNum) && priceNum > 0
        ? `$${s.price}/${escapeHtml(s.priceType || 'kWh')}`
        : 'Rate varies');
      if (pw.length) specLines.push(pw.join(' · '));
      const specsHtml = specLines.length
        ? `<div class="ev-specs">${specLines.map((l) => `<span>${l}</span>`).join('')}</div>`
        : '';
      return `
        <button class="card" data-lat="${s.lat}" data-lng="${s.lng}"
                style="animation-delay:${Math.min(idx * 25, 200)}ms">
          <div class="card-top">
            <div class="card-info">
              <div class="card-name">${escapeHtml(titleCase(s.name))}</div>
              <div class="card-meta">
                <span>${formatDistance(s.dist)}</span>
                <span class="meta-dot"></span>
                <span class="agency-badge">${op}</span>
              </div>
              ${specsHtml}
            </div>
            <div class="card-lots">
              <div class="status-dot ${color}"></div>
              <div class="lots-pill">
                <span class="lots-num ${color}">${s.available}</span>
                <span style="font-size:15px;font-weight:600;color:var(--text-faint);">/${s.total}</span>
              </div>
              <div class="lots-label">free</div>
            </div>
          </div>
        </button>`;
    }).join('');

    els.content.innerHTML = `<div class="list">${rows}</div>`;
    els.footerNote.textContent = `${items.length} nearest of ${state.ev.length} stations island-wide`;

    const label = state.locationLabel
      ? `Near <strong>${escapeHtml(state.locationLabel)}</strong>`
      : 'Near you';
    els.locationText.innerHTML = label;
    els.locationPill.style.display = '';
  }

  async function loadEV({ silent = false } = {}) {
    if (state.inFlight) return;
    state.inFlight = true;
    els.refreshBtn.classList.add('spinning');
    try {
      const res = await fetch('/api/ev');
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const json = await res.json();
      state.ev = json.data || [];
      updateEVBadge();
      if (state.view === 'ev') {
        state.fetchedAt = json.fetchedAt ? Date.parse(json.fetchedAt) : Date.now();
        state.stale = !!json.stale;
        state.lastRefreshAt = Date.now();
        setBanner(state.stale ? 'Data may be outdated — LTA service is unreachable.' : '');
        renderEV();
        tickUpdated();
        if (!silent) showToast('Updated');
      }
    } catch (err) {
      console.error('loadEV failed:', err);
      if (state.view === 'ev' && state.ev.length === 0) {
        els.content.innerHTML = `
          <div class="state-msg">
            <div class="title">Couldn't load EV data</div>
            <div class="sub">${escapeHtml(err.message)}<br><br>Tap refresh to try again.</div>
          </div>`;
      } else if (!silent) {
        showToast('Refresh failed');
      }
    } finally {
      state.inFlight = false;
      setTimeout(() => els.refreshBtn.classList.remove('spinning'), 300);
    }
  }

  // ---------- badge helpers ----------
  // 1.3 Traffic badge: show filtered count (5km radius when position known)
  function updateTrafficBadge() {
    const items = buildIncidentList();
    els.trafficCount.style.display = items.length ? '' : 'none';
    els.trafficCount.textContent = items.length;
  }

  // 1.2 EV badge: show nearby count (FAR_RADIUS_M) not total island count
  function countNearbyEV() {
    if (!state.position || !state.ev.length) return 0;
    return state.ev.filter((s) =>
      isFinite(s.lat) && isFinite(s.lng) &&
      haversine(state.position.lat, state.position.lng, s.lat, s.lng) <= FAR_RADIUS_M
    ).length;
  }
  function updateEVBadge() {
    const count = countNearbyEV();
    els.evCount.style.display = count ? '' : 'none';
    els.evCount.textContent = count;
  }

  // ---------- carpark metadata: HDB info + public holidays ----------
  async function loadCarparkMeta() {
    try {
      const res = await fetch('/api/carpark-meta');
      if (!res.ok) return;
      const j = await res.json();
      state.carparkMeta = {
        hdb: j.hdb || {},
        publicHolidays: j.publicHolidays || [],
        ltaRates: j.ltaRates || {},
      };
      // Re-render so rate rows + occupancy appear once metadata arrives.
      if (state.view === 'parking' && state.position) render();
    } catch (err) {
      console.warn('[carpark-meta] failed to load:', err.message);
    }
  }

  // ---------- private carpark seed ----------
  async function loadPrivateCarparks() {
    try {
      const res = await fetch('/data/private-carparks.json');
      if (!res.ok) return;
      const data = await res.json();
      state.privateParks = Array.isArray(data) ? data : [];
    } catch (err) {
      console.warn('[private-parks] failed to load seed data:', err.message);
      state.privateParks = [];
    }
  }

  // ---------- active-view dispatch ----------
  function refreshActive({ silent = true } = {}) {
    if (state.view === 'traffic') return loadIncidents({ silent });
    if (state.view === 'ev') return loadEV({ silent });
    if (state.view === 'trip') return Promise.resolve(); // trip is user-initiated only
    if (!state.position) return Promise.resolve();
    return loadCarparks({ silent });
  }

  // ---------- Trip tab ----------
  function handleTripDestInput(q) {
    tripSugIdx = -1;
    if (tripSugTimer) clearTimeout(tripSugTimer);
    const listEl = document.getElementById('tripSuggestList');
    if (!listEl) return;
    if (q.length < 2) { listEl.classList.remove('open'); listEl.innerHTML = ''; return; }
    tripSugTimer = setTimeout(async () => {
      if (tripSugCtrl) tripSugCtrl.abort();
      tripSugCtrl = new AbortController();
      try {
        const json = await geocode(q, tripSugCtrl.signal);
        tripSuggestions = json.results || [];
        const el = document.getElementById('tripSuggestList');
        if (!el) return;
        if (!tripSuggestions.length) {
          el.innerHTML = `<li class="suggest-item empty">No matches for "${escapeHtml(q)}"</li>`;
          el.classList.add('open');
          return;
        }
        el.innerHTML = tripSuggestions.map((r, i) => `
          <li class="suggest-item" data-tidx="${i}" role="option">
            ${escapeHtml(r.label)}
            ${r.address && r.address !== r.label ? `<span class="sub">${escapeHtml(r.address)}</span>` : ''}
          </li>`).join('');
        el.classList.add('open');
      } catch (err) {
        if (err.name !== 'AbortError') console.error('[trip suggest]', err.message);
      }
    }, 220);
  }

  function pickTripDest(result) {
    state.tripDest = { lat: result.lat, lng: result.lng, label: result.label };
    const destInput = document.getElementById('tripDestInput');
    if (destInput) { destInput.value = result.label; destInput.blur(); }
    const listEl = document.getElementById('tripSuggestList');
    if (listEl) { listEl.classList.remove('open'); listEl.innerHTML = ''; }
    tripSuggestions = [];
    tripSugIdx = -1;
    pushRecent(result);
    // Auto-trigger directions as soon as we have a destination + origin
    if (!state.tripInFlight && (state.tripOrigin || state.userGps || state.position)) {
      loadDirections();
    }
  }

  // Corridor labels are "AYE (Portsdown–Alexandra citybound; …)". The
  // expressway code is shown separately, so strip the "XXX ( … )" wrapper
  // and keep just the descriptive inner text for compact rows.
  function zoneDesc(label) {
    const m = String(label || '').match(/^[A-Z]{2,4}\s*\((.+)\)\s*$/);
    return (m ? m[1] : String(label || '')).trim();
  }

  function erpBlock(erp) {
    const ERP_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>`;
    const OK_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
    if (!erp) return '';
    const cors = erp.corridors || [];
    // Route crosses no priced gantry at all → clean "free" pill.
    if (!cors.length) {
      return `<div class="route-erp ok pill">${OK_ICON}<span><strong>No ERP</strong> · ${escapeHtml(erp.reason)}</span></div>`;
    }
    const total = erp.estHigh || 0;
    // Every crossed gantry is listed — including $0 ones — so the driver
    // can see it was checked and confirmed free at their arrival time.
    const lines = cors.map((c) => `
      <div class="erp-line ${c.free ? 'free' : 'charged'}">
        <span class="erp-g">
          <span class="erp-gname"><b>${escapeHtml(c.expressway)}</b> ${escapeHtml(zoneDesc(c.label))}</span>
          <span class="erp-arr">Arrive ~${escapeHtml(c.arrival)} · ${escapeHtml(c.dayType)}${c.window ? ' · ' + escapeHtml(c.window) : ''}</span>
        </span>
        <span class="erp-amt">$${c.rate.toFixed(2)}</span>
      </div>`).join('');
    const cls = total > 0 ? 'warn' : 'ok';
    return `
      <div class="route-erp ${cls}">
        <div class="erp-top">${total > 0 ? ERP_ICON : OK_ICON}<span>Est. ERP <strong>$${total.toFixed(2)}</strong></span>
          <span class="erp-sub">leave ~${escapeHtml(erp.sgTime)}</span></div>
        ${lines}
        <div class="erp-foot">Charged at each gantry’s estimated arrival time. Arrival times are estimates.</div>
      </div>`;
  }

  function renderTripRoutes() {
    const container = document.getElementById('tripRoutes');
    if (!container) return;
    if (!state.routes.length) { container.innerHTML = ''; return; }

    const NAV_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>`;

    // Identify a cheaper alternative (lower upper-bound ERP than the fastest)
    const fastHi = state.routes[0]?.erp?.charging ? state.routes[0].erp.estHigh : 0;

    const cards = state.routes.map((route, idx) => {
      const badgeClass = idx === 0 ? 'fastest' : 'alt';
      const summary = route.summary ? `via ${escapeHtml(route.summary)}` : 'Direct route';
      const myHi = route.erp?.charging ? route.erp.estHigh : 0;
      const saves = idx > 0 && fastHi > 0 && myHi < fastHi
        ? `<span class="route-save">−$${(fastHi - myHi).toFixed(2)}</span>` : '';
      const e = route.erp;
      let erpAmt, erpCls;
      if (!e || !e.charging) { erpAmt = '$0'; erpCls = 'free'; }
      else {
        erpAmt = e.estLow === e.estHigh
          ? `$${e.estLow.toFixed(2)}`
          : `$${e.estLow.toFixed(0)}–$${e.estHigh.toFixed(0)}`;
        erpCls = '';
      }
      const erpHeadline =
        `<span class="route-erp-total ${erpCls}">
           <span class="ret-amt">${erpAmt}</span>
           <span class="ret-lbl">${erpCls === 'free' ? 'no ERP' : 'est. ERP'}</span>
         </span>`;
      const nearCams = camerasNearPath(route.path || []).slice(0, 8);
      const camStrip = nearCams.length
        ? `<button type="button" class="cam-strip-toggle" aria-expanded="false">
             ${CAM_ICON}<span>Live cameras on this route (${nearCams.length})</span>
             <svg class="cam-strip-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
           </button>
           <div class="cam-strip" hidden>${nearCams.map(cameraCardHtml).join('')}</div>`
        : '';
      return `
        <div class="route-card" style="animation-delay:${idx * 60}ms">
          <div class="route-header">
            <span class="route-badge ${badgeClass}">${escapeHtml(route.label)}</span>
            <span class="route-summary">${summary}</span>
            <a class="nav-btn" href="${escapeHtml(route.mapsUrl)}" target="_blank" rel="noopener">
              Navigate ${NAV_ICON}
            </a>
          </div>
          <div class="route-stats">
            <span class="route-time">${escapeHtml(route.duration)}</span>
            <span class="route-dist">${escapeHtml(route.distance)}</span>
            <span class="route-stats-right">${saves}${erpHeadline}</span>
          </div>
          ${erpBlock(route.erp)}
          ${camStrip}
        </div>`;
    }).join('');

    // Cameras may not have loaded yet — fetch then re-render once.
    if (!state.cameras.length) loadCameras();

    const noAlt = state.noErpFreeAlt
      ? `<div class="erp-noalt">No fully ERP-free route to here — every option passes priced gantries. Compare the estimates above to pick your trade-off.</div>`
      : '';

    const meta = state.erpMeta && state.erpMeta.effectiveFrom
      ? `<div class="erp-meta">ERP rates effective ${escapeHtml(state.erpMeta.effectiveFrom)} ·
           <a href="${escapeHtml(state.erpMeta.url || '#')}" target="_blank" rel="noopener">official LTA rates ↗</a></div>`
      : '';

    container.innerHTML = `<div class="list">${cards}</div>${noAlt}${meta}`;
  }

  // ============================================================
  //  ERP Rates table (Workstream 6)
  // ============================================================
  let erpDataPromise = null;
  function loadErpData() {
    if (state.erpRates && state.erpZoneMap) return Promise.resolve();
    if (erpDataPromise) return erpDataPromise;
    erpDataPromise = Promise.all([
      fetch('/data/erp-rates.json').then((r) => r.json()),
      fetch('/data/erp-zone-map.json').then((r) => r.json()),
    ]).then(([rates, zmap]) => {
      state.erpRates = rates;
      state.erpZoneMap = zmap;
    }).catch((e) => { console.warn('[erp] data load failed:', e.message); });
    return erpDataPromise;
  }

  const ERP_DAY_LABEL = { weekday: 'Weekdays', sat: 'Saturday', sunph: 'Sunday / PH' };
  // Reuse sgNow() + isPublicHoliday() from the rates module (WS5).
  function erpToday() {
    const t = sgNow();
    if (t.dow === 'Sun' || isPublicHoliday(t.ymd)) return 'sunph';
    if (t.dow === 'Sat') return 'sat';
    return 'weekday';
  }
  function erpMult() {
    const m = state.erpRates && state.erpRates.vehicleMultipliers;
    return (m && m[state.tripVehicle]) || 1;
  }
  const hhmmToMin = (s) => {
    const [h, m] = String(s).split(':').map(Number);
    return h * 60 + m;
  };
  // Active priced window for a corridor at SG-now (weekday only).
  function erpActiveWindow(corridor) {
    const t = sgNow();
    const now = t.mins;
    for (const w of corridor.windows) {
      if (now >= hhmmToMin(w.start) && now < hhmmToMin(w.end) && w.rate > 0) return w;
    }
    return null;
  }
  function erpExpresswaysWithData() {
    const set = [...new Set((state.erpRates.corridors || []).map((c) => c.expressway))];
    const order = (state.erpZoneMap && state.erpZoneMap.searchPriority) || [];
