  <div id="banner"></div>
  <div id="content"></div>
  <div id="footerNote" class="footer-note"></div>
  <div id="toast" class="toast"></div>

<script>
(() => {
  'use strict';

  const REFRESH_MS = 60_000;
  const GEO_TIMEOUT_MS = 8_000;
  const NEAR_RADIUS_M = 2_000;
  const FAR_RADIUS_M = 5_000;
  const INCIDENT_RADIUS_M = 5_000;
  const MAX_RESULTS = 10;
  const MIN_RESULTS_BEFORE_EXPAND = 5;

  const state = {
    view: 'parking',          // 'parking' | 'traffic' | 'ev' | 'trip'
    position: null,
    locationLabel: null,
    userGps: null,            // real device location (never overwritten by search)
    userGpsLabel: null,       // reverse-geocoded label for userGps
    carparks: [],
    incidents: [],
    ev: [],
    privateParks: [],
    tripDest: null,
    tripVehicle: 'car',
    routes: [],
    erpMeta: null,
    tripInFlight: false,
    fetchedAt: 0,
    stale: false,
    refreshTimer: null,
    countdownTimer: null,
    lastRefreshAt: 0,
    inFlight: false,
    cardEls: new Map(),
    suggestions: [],
  };

  const $ = (id) => document.getElementById(id);
  const els = {
    content: $('content'),
    banner: $('banner'),
    footerNote: $('footerNote'),
    updatedLine: $('updatedLine'),
    countdownFill: $('countdownFill'),
    locationPill: $('locationPill'),
    locationText: $('locationText'),
    locationBtn: $('locationBtn'),
    refreshBtn: $('refreshBtn'),
    themeToggle: $('themeToggle'),
    header: $('header'),
    searchBar: $('searchBar'),
    searchInput: $('searchInput'),
    suggestList: $('suggestList'),
    clearBtn: $('clearBtn'),
    toast: $('toast'),
    segControl: $('segControl'),
    segIndicator: $('segIndicator'),
    trafficCount: $('trafficCount'),
    evCount: $('evCount'),
  };

  let suggestController = null;
  let suggestTimer = null;
  let activeSuggestIdx = -1;

  // Trip-specific module-level vars
  let tripSuggestions = [];
  let tripSugIdx = -1;
  let tripSugTimer = null;
  let tripSugCtrl = null;

  // ---------- helpers ----------
  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) ** 2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLng/2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function formatDistance(m) {
    if (m < 1000) return `${Math.round(m / 10) * 10}m`;
    return `${(m / 1000).toFixed(1)}km`;
  }

  function lotColor(lots) {
    if (lots === 0) return 'grey';
    if (lots <= 4) return 'red';
    if (lots <= 20) return 'amber';
    return 'green';
  }

  function titleCase(s) {
    if (!s) return '';
    return s.toLowerCase().replace(/\b\w/g, (c) => c.toUpperCase());
  }

  function parseLocation(loc) {
    if (!loc || typeof loc !== 'string') return null;
    const parts = loc.trim().split(/\s+/);
    if (parts.length !== 2) return null;
    const lat = parseFloat(parts[0]);
    const lng = parseFloat(parts[1]);
    if (!isFinite(lat) || !isFinite(lng)) return null;
    return { lat, lng };
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function showToast(msg, ms = 1800) {
    els.toast.textContent = msg;
    els.toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => els.toast.classList.remove('show'), ms);
  }

  function setBanner(msg) {
    els.banner.innerHTML = msg ? `<div class="banner">${msg}</div>` : '';
  }

  // ---------- aggregation (car lots only) ----------
  function aggregate(records) {
    const groups = new Map();
    for (const r of records) {
      if (r.LotType !== 'C') continue; // car lots only
      const id = r.CarParkID;
      if (!id) continue;
      const coords = parseLocation(r.Location);
      if (!coords) continue;
      groups.set(id, {
        id,
        name: r.Development || id,
        area: r.Area || '',
        agency: r.Agency || '',
        lat: coords.lat,
        lng: coords.lng,
        lots: parseInt(r.AvailableLots, 10) || 0,
        total: parseInt(r.TotalLots, 10) || 0,
      });
    }
    return Array.from(groups.values());
  }

  // ---------- list building ----------
  function buildList() {
    if (!state.position) return null;
    const groups = aggregate(state.carparks);

    // Merge in private (static seed) carparks
    const privItems = (state.privateParks || []).map((p) => ({
      id: p.id,
      name: p.name,
      area: '',
      agency: 'Private',
      lat: p.lat,
      lng: p.lng,
      lots: null,    // no live data
      total: 0,
      isPrivate: true,
    }));

    const all = [...groups, ...privItems];
    const enriched = all.map((g) => ({
      ...g,
      dist: haversine(state.position.lat, state.position.lng, g.lat, g.lng),
    }));

    enriched.sort((a, b) => {
      // Deprioritise full or no-data carparks
      const aDeprio = (a.lots === 0 || a.lots == null) ? 1 : 0;
      const bDeprio = (b.lots === 0 || b.lots == null) ? 1 : 0;
      if (aDeprio !== bDeprio) return aDeprio - bDeprio;
      if (Math.abs(a.dist - b.dist) > 50) return a.dist - b.dist;
      return (b.lots ?? 0) - (a.lots ?? 0);
    });

    let radius = NEAR_RADIUS_M;
    let nearby = enriched.filter((c) => c.dist <= radius);
    // Expand radius if too few *public* results (private parks don't count toward minimum)
    if (nearby.filter((c) => !c.isPrivate).length < MIN_RESULTS_BEFORE_EXPAND) {
      radius = FAR_RADIUS_M;
      nearby = enriched.filter((c) => c.dist <= radius);
    }
    return { items: nearby.slice(0, MAX_RESULTS), radius, total: enriched.length };
  }

  function makeCard(c) {
    const card = document.createElement('button');
    card.className = 'card';
    card.dataset.id = c.id;
    card.innerHTML = `
      <div class="card-info">
        <div class="card-name"></div>
        <div class="card-meta">
          <span class="dist"></span>
          <span class="meta-dot"></span>
          <span class="agency-badge"></span>
        </div>
      </div>
      <div class="card-lots">
        <div class="status-dot"></div>
        <div class="lots-num"></div>
        <div class="lots-label">lots</div>
      </div>
      <div class="card-bar"><div class="card-bar-fill"></div></div>
    `;
    card.addEventListener('click', () => {
      const url = `https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lng}&travelmode=driving`;
      window.open(url, '_blank', 'noopener');
    });
    return card;
  }

  function updateCard(card, c) {
    card.querySelector('.card-name').textContent = titleCase(c.name);
    card.querySelector('.dist').textContent = formatDistance(c.dist);
    const agency = card.querySelector('.agency-badge');
    agency.textContent = c.agency || '';
    agency.style.display = c.agency ? '' : 'none';
    const dot = card.querySelector('.meta-dot');
    dot.style.display = c.agency ? '' : 'none';
    const color = c.lots == null ? 'grey' : lotColor(c.lots);
    const lotsEl = card.querySelector('.lots-num');
    const statusDot = card.querySelector('.status-dot');
    const prev = lotsEl.textContent;
    const newText = c.lots == null ? '–' : String(c.lots);
    lotsEl.textContent = newText;
    lotsEl.className = `lots-num ${color}`;
    statusDot.className = `status-dot ${color}`;
    card.classList.toggle('full', c.lots === 0);
    if (prev && prev !== newText && c.lots != null) {
      lotsEl.style.opacity = '0.4';
      requestAnimationFrame(() => { lotsEl.style.transition = 'opacity 0.4s'; lotsEl.style.opacity = '1'; });
    }
    // Progress bar: shows fraction of lots available (green = lots free, red = nearly full)
    const barFill = card.querySelector('.card-bar-fill');
    if (barFill) {
      const pct = (c.lots != null && c.total > 0) ? Math.round((c.lots / c.total) * 100) : 0;
      barFill.style.width = `${pct}%`;
      barFill.className = `card-bar-fill ${color}`;
    }
  }

  function render() {
    if (!state.position) return;
    const result = buildList();
    if (!result) return;
    const { items, radius, total } = result;

    // 1.1 Private carpark disclaimer: show when search is active and public results are sparse
    if (!state.stale) {
      const publicCount = items.filter((i) => !i.isPrivate).length;
      if (state.locationLabel && publicCount < 3) {
        setBanner(
          'Some carparks (e.g. Jewel Changi, ION Orchard) are privately managed and won\'t appear in public data. ' +
          'Check the mall website or try <a href="https://www.ura.gov.sg/maps/parkinglots" target="_blank" rel="noopener" ' +
          'style="color:inherit;font-weight:600;text-decoration:underline;">URA Maps</a>.'
        );
      } else {
        setBanner('');
      }
    }

    if (items.length === 0) {
      state.cardEls.clear();
      els.content.innerHTML = `
        <div class="state-msg">
          <div class="title">No carparks found nearby</div>
          <div class="sub">${total === 0 ? 'No car carparks match your filter.' : 'Try searching by area instead.'}</div>
        </div>`;
      els.footerNote.textContent = '';
      return;
    }

    let list = els.content.querySelector('.list');
    if (!list) {
      els.content.innerHTML = '<div class="list"></div>';
      list = els.content.querySelector('.list');
      state.cardEls.clear();
    }

    const seen = new Set();
    items.forEach((c, idx) => {
      seen.add(c.id);
      let card = state.cardEls.get(c.id);
      const isNew = !card;
      if (isNew) {
        card = makeCard(c);
        card.style.animationDelay = `${Math.min(idx * 25, 200)}ms`;
        state.cardEls.set(c.id, card);
      }
      updateCard(card, c);
      const expectedNode = list.children[idx];
      if (expectedNode !== card) {
        list.insertBefore(card, expectedNode || null);
      }
    });
    for (const [id, el] of state.cardEls) {
      if (!seen.has(id)) {
        el.remove();
        state.cardEls.delete(id);
      }
    }

    const radiusKm = radius / 1000;
    els.footerNote.textContent = `Showing ${items.length} of ${total} carparks within ${radiusKm}km`;

    if (!state.locationLabel) {
      const nearestArea = items[0]?.area;
      els.locationText.innerHTML = nearestArea
        ? `Near <strong>${escapeHtml(titleCase(nearestArea))}</strong>`
        : 'Near you';
    } else {
      els.locationText.innerHTML = `Near <strong>${escapeHtml(state.locationLabel)}</strong>`;
    }
    els.locationPill.style.display = '';
  }

  // ---------- updated / countdown ----------
  function tickUpdated() {
    if (!state.fetchedAt) return;
    const ageS = Math.floor((Date.now() - state.fetchedAt) / 1000);
    const stale = state.stale ? ' · using cached data' : '';
    els.updatedLine.innerHTML = `<span class="pulse-dot"></span>Updated ${ageS}s ago${stale}`;
    const elapsed = Date.now() - state.lastRefreshAt;
    const remaining = Math.max(0, 1 - elapsed / REFRESH_MS);
    els.countdownFill.style.transform = `scaleX(${remaining})`;
  }

  // ---------- network ----------
  async function loadCarparks({ silent = false } = {}) {
    if (state.inFlight) return;
    state.inFlight = true;
    els.refreshBtn.classList.add('spinning');
    try {
      const res = await fetch('/api/carparks');
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const json = await res.json();
      state.carparks = json.data || [];
      state.fetchedAt = json.fetchedAt ? Date.parse(json.fetchedAt) : Date.now();
      state.stale = !!json.stale;
      state.lastRefreshAt = Date.now();
      setBanner(state.stale ? 'Data may be outdated — LTA service is unreachable.' : '');
      render();
      tickUpdated();
      if (!silent) showToast('Updated');
    } catch (err) {
      console.error('loadCarparks failed:', err);
      if (state.carparks.length === 0) {
        els.content.innerHTML = `
          <div class="state-msg">
            <div class="title">Couldn't load carparks</div>
            <div class="sub">${escapeHtml(err.message)}<br><br>Tap refresh to try again.</div>
          </div>`;
      } else {
        showToast('Refresh failed');
      }
    } finally {
      state.inFlight = false;
      setTimeout(() => els.refreshBtn.classList.remove('spinning'), 300);
    }
  }

  // ---------- traffic incidents ----------
  const INCIDENT_ICONS = {
    alert: '<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line>',
    cone: '<path d="M9.5 4 5 20h14L14.5 4z"></path><line x1="3" y1="20" x2="21" y2="20"></line><line x1="8" y1="13" x2="16" y2="13"></line>',
    car: '<path d="M5 17h14M6.5 17l1-5h9l1 5M8 12l1-4h6l1 4"></path><circle cx="8" cy="17.5" r="1.6"></circle><circle cx="16" cy="17.5" r="1.6"></circle>',
    arrows: '<polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path>',
    info: '<circle cx="12" cy="12" r="9"></circle><line x1="12" y1="11" x2="12" y2="16"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>',
  };

  function incidentMeta(type) {
    const t = (type || '').toLowerCase();
    if (t.includes('accident')) return { icon: 'alert', color: 'red' };
    if (t.includes('road block') || t.includes('roadblock')) return { icon: 'alert', color: 'red' };
    if (t.includes('roadwork') || t.includes('road work') || t.includes('plant') || t.includes('equipment')) return { icon: 'cone', color: 'amber' };
    if (t.includes('breakdown') || t.includes('vehicle')) return { icon: 'car', color: 'amber' };
    if (t.includes('heavy traffic') || t.includes('obstacle')) return { icon: 'alert', color: 'amber' };
    if (t.includes('diversion')) return { icon: 'arrows', color: 'accent' };
    return { icon: 'info', color: 'grey' };
  }

  // Parse "(18/5)13:53 Accident on ..." -> { time, text }
  function parseIncidentMsg(msg) {
    const m = String(msg || '').match(/^\((\d{1,2})\/(\d{1,2})\)\s*(\d{1,2}:\d{2})\s*(.*)$/s);
    if (!m) return { time: '', text: String(msg || '') };
    return { time: m[3], date: `${m[1]}/${m[2]}`, text: m[4].trim() };
  }

  const SEVERITY = { red: 0, amber: 1, accent: 2, grey: 3 };

  function buildIncidentList() {
    const list = (state.incidents || [])
      .filter((i) => isFinite(i.Latitude) && isFinite(i.Longitude))
      .map((i) => {
        const meta = incidentMeta(i.Type);
        const parsed = parseIncidentMsg(i.Message);
        const dist = state.position
          ? haversine(state.position.lat, state.position.lng, i.Latitude, i.Longitude)
          : null;
        return { ...i, meta, parsed, dist };
      })
      // 1.3 Tighten to 5km radius when position is known
      .filter((i) => i.dist == null || i.dist <= INCIDENT_RADIUS_M);

    list.sort((a, b) => {
      if (a.dist != null && b.dist != null) return a.dist - b.dist;
      const s = SEVERITY[a.meta.color] - SEVERITY[b.meta.color];
      if (s !== 0) return s;
      return 0;
    });
    return list;
  }

  function renderIncidents() {
    const items = buildIncidentList();
    els.trafficCount.style.display = items.length ? '' : 'none';
    els.trafficCount.textContent = items.length;

    if (items.length === 0) {
      els.content.innerHTML = `
        <div class="state-msg">
          <div class="title">No active traffic incidents</div>
          <div class="sub">Roads are clear right now. This refreshes automatically.</div>
        </div>`;
      els.footerNote.textContent = '';
      els.locationPill.style.display = 'none';
      return;
    }

    const rows = items.map((it, idx) => {
      const distStr = it.dist != null ? formatDistance(it.dist) : '';
      const metaParts = [];
      if (it.parsed.time) metaParts.push(escapeHtml(it.parsed.time));
      if (distStr) metaParts.push(escapeHtml(distStr) + ' away');
      const metaHtml = metaParts
        .map((p, i) => (i ? '<span class="dot"></span>' : '') + `<span>${p}</span>`)
        .join('');
      return `
        <button class="incident-card" data-lat="${it.Latitude}" data-lng="${it.Longitude}"
                style="animation-delay:${Math.min(idx * 25, 200)}ms">
          <span class="incident-icon ${it.meta.color}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">${INCIDENT_ICONS[it.meta.icon]}</svg>
          </span>
          <span class="incident-body">
            <span class="incident-top">
              <span class="incident-type">${escapeHtml(it.Type || 'Incident')}</span>
            </span>
            <span class="incident-meta">${metaHtml}</span>
            <span class="incident-msg">${escapeHtml(it.parsed.text)}</span>
          </span>
        </button>`;
    }).join('');

    els.content.innerHTML = `<div class="list">${rows}</div>`;
    els.footerNote.textContent = state.position
      ? `${items.length} incident${items.length === 1 ? '' : 's'} · nearest first`
      : `${items.length} incident${items.length === 1 ? '' : 's'} island-wide`;

    if (state.position) {
      const label = state.locationLabel
        ? `Near <strong>${escapeHtml(state.locationLabel)}</strong>`
        : 'Near you';
      els.locationText.innerHTML = label;
      els.locationPill.style.display = '';
    } else {
      els.locationPill.style.display = 'none';
    }
  }

  async function loadIncidents({ silent = false } = {}) {
    if (state.inFlight) return;
    state.inFlight = true;
    els.refreshBtn.classList.add('spinning');
    try {
      const res = await fetch('/api/incidents');
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const json = await res.json();
      state.incidents = json.data || [];
      updateTrafficBadge();
      if (state.view === 'traffic') {
        state.fetchedAt = json.fetchedAt ? Date.parse(json.fetchedAt) : Date.now();
        state.stale = !!json.stale;
        state.lastRefreshAt = Date.now();
        setBanner(state.stale ? 'Data may be outdated — LTA service is unreachable.' : '');
        renderIncidents();
        tickUpdated();
        if (!silent) showToast('Updated');
      }
    } catch (err) {
      console.error('loadIncidents failed:', err);
      if (state.view === 'traffic' && state.incidents.length === 0) {
        els.content.innerHTML = `
          <div class="state-msg">
            <div class="title">Couldn't load traffic data</div>
            <div class="sub">${escapeHtml(err.message)}<br><br>Tap refresh to try again.</div>
          </div>`;
      } else if (!silent) {
        showToast('Refresh failed');
      }
    } finally {
      state.inFlight = false;
      setTimeout(() => els.refreshBtn.classList.remove('spinning'), 300);
    }
  }

  // ---------- EV charging ----------
  function evColor(available, total) {
    if (total === 0 || available === 0) return 'grey';
    const ratio = available / total;
    if (ratio >= 0.5 || available > 4) return 'green';
    if (available >= 1) return 'amber';
    return 'grey';
  }

  function buildEVList() {
    if (!state.position) return [];
    const list = (state.ev || [])
      .filter((s) => isFinite(s.lat) && isFinite(s.lng))
      .map((s) => ({
        ...s,
        dist: haversine(state.position.lat, state.position.lng, s.lat, s.lng),
      }));
    list.sort((a, b) => {
      const aOk = a.available > 0 ? 0 : 1;
      const bOk = b.available > 0 ? 0 : 1;
      if (aOk !== bOk) return aOk - bOk;
      return a.dist - b.dist;
    });
    return list.slice(0, MAX_RESULTS);
  }

  function renderEV() {
    if (!state.position) {
      els.content.innerHTML = `
        <div class="state-msg">
          <div class="title">Find EV charging near you</div>
          <div class="sub">Use your location or search for a destination above.</div>
        </div>`;
      els.locationPill.style.display = 'none';
      els.footerNote.textContent = '';
      return;
    }
    const items = buildEVList();
    if (items.length === 0) {
      els.content.innerHTML = `
        <div class="state-msg">
          <div class="title">No EV chargers nearby</div>
          <div class="sub">Try searching a different area.</div>
        </div>`;
      els.footerNote.textContent = '';
      return;
    }

    const rows = items.map((s, idx) => {
      const color = evColor(s.available, s.total);
      const op = s.operators[0]
        ? escapeHtml(titleCase(s.operators[0].replace(/\b(PTE\.?|LTD\.?|LIMITED|SERVICES|SINGAPORE)\b/gi, '').replace(/\s+/g, ' ').trim()) || s.operators[0])
        : 'EV Charging';
      const specs = [];
      if (s.plugs.length) specs.push(escapeHtml(s.plugs.join(' · ')));
      if (s.maxKw) specs.push(`${s.maxKw} kW`);
      if (s.price) specs.push(`$${s.price}/${escapeHtml(s.priceType || 'kWh')}`);
      return `
        <button class="card" data-lat="${s.lat}" data-lng="${s.lng}"
                style="animation-delay:${Math.min(idx * 25, 200)}ms">
          <div class="card-info">
            <div class="card-name">${escapeHtml(titleCase(s.name))}</div>
            <div class="card-meta">
              <span>${formatDistance(s.dist)}</span>
              <span class="meta-dot"></span>
              <span class="agency-badge">${op}</span>
            </div>
            <div class="card-meta" style="margin-top:4px;">${specs.join(' &nbsp;·&nbsp; ')}</div>
          </div>
          <div class="card-lots">
            <div class="status-dot ${color}"></div>
            <div class="lots-pill">
              <span class="lots-num ${color}">${s.available}</span>
              <span style="font-size:15px;font-weight:600;color:var(--text-faint);">/${s.total}</span>
            </div>
            <div class="lots-label">free</div>
          </div>
        </button>`;
    }).join('');

    els.content.innerHTML = `<div class="list">${rows}</div>`;
    els.footerNote.textContent = `${items.length} nearest of ${state.ev.length} stations island-wide`;

    const label = state.locationLabel
      ? `Near <strong>${escapeHtml(state.locationLabel)}</strong>`
      : 'Near you';
    els.locationText.innerHTML = label;
    els.locationPill.style.display = '';
  }

  async function loadEV({ silent = false } = {}) {
    if (state.inFlight) return;
    state.inFlight = true;
    els.refreshBtn.classList.add('spinning');
    try {
      const res = await fetch('/api/ev');
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const json = await res.json();
      state.ev = json.data || [];
      updateEVBadge();
      if (state.view === 'ev') {
        state.fetchedAt = json.fetchedAt ? Date.parse(json.fetchedAt) : Date.now();
        state.stale = !!json.stale;
        state.lastRefreshAt = Date.now();
        setBanner(state.stale ? 'Data may be outdated — LTA service is unreachable.' : '');
        renderEV();
        tickUpdated();
        if (!silent) showToast('Updated');
      }
    } catch (err) {
      console.error('loadEV failed:', err);
      if (state.view === 'ev' && state.ev.length === 0) {
        els.content.innerHTML = `
          <div class="state-msg">
            <div class="title">Couldn't load EV data</div>
            <div class="sub">${escapeHtml(err.message)}<br><br>Tap refresh to try again.</div>
          </div>`;
      } else if (!silent) {
        showToast('Refresh failed');
      }
    } finally {
      state.inFlight = false;
      setTimeout(() => els.refreshBtn.classList.remove('spinning'), 300);
    }
  }

  // ---------- badge helpers ----------
  // 1.3 Traffic badge: show filtered count (5km radius when position known)
  function updateTrafficBadge() {
    const items = buildIncidentList();
    els.trafficCount.style.display = items.length ? '' : 'none';
    els.trafficCount.textContent = items.length;
  }

  // 1.2 EV badge: show nearby count (FAR_RADIUS_M) not total island count
  function countNearbyEV() {
    if (!state.position || !state.ev.length) return 0;
    return state.ev.filter((s) =>
      isFinite(s.lat) && isFinite(s.lng) &&
      haversine(state.position.lat, state.position.lng, s.lat, s.lng) <= FAR_RADIUS_M
    ).length;
  }
  function updateEVBadge() {
    const count = countNearbyEV();
    els.evCount.style.display = count ? '' : 'none';
    els.evCount.textContent = count;
  }

  // ---------- private carpark seed ----------
  async function loadPrivateCarparks() {
    try {
      const res = await fetch('/data/private-carparks.json');
      if (!res.ok) return;
      const data = await res.json();
      state.privateParks = Array.isArray(data) ? data : [];
    } catch (err) {
      console.warn('[private-parks] failed to load seed data:', err.message);
      state.privateParks = [];
    }
  }

  // ---------- active-view dispatch ----------
  function refreshActive({ silent = true } = {}) {
    if (state.view === 'traffic') return loadIncidents({ silent });
    if (state.view === 'ev') return loadEV({ silent });
    if (state.view === 'trip') return Promise.resolve(); // trip is user-initiated only
    if (!state.position) return Promise.resolve();
    return loadCarparks({ silent });
  }

  // ---------- Trip tab ----------
  function handleTripDestInput(q) {
    tripSugIdx = -1;
    if (tripSugTimer) clearTimeout(tripSugTimer);
    const listEl = document.getElementById('tripSuggestList');
    if (!listEl) return;
    if (q.length < 2) { listEl.classList.remove('open'); listEl.innerHTML = ''; return; }
    tripSugTimer = setTimeout(async () => {
      if (tripSugCtrl) tripSugCtrl.abort();
      tripSugCtrl = new AbortController();
      try {
        const json = await geocode(q, tripSugCtrl.signal);
        tripSuggestions = json.results || [];
        const el = document.getElementById('tripSuggestList');
        if (!el) return;
        if (!tripSuggestions.length) {
          el.innerHTML = `<li class="suggest-item empty">No matches for "${escapeHtml(q)}"</li>`;
          el.classList.add('open');
          return;
        }
        el.innerHTML = tripSuggestions.map((r, i) => `
          <li class="suggest-item" data-tidx="${i}" role="option">
            ${escapeHtml(r.label)}
            ${r.address && r.address !== r.label ? `<span class="sub">${escapeHtml(r.address)}</span>` : ''}
          </li>`).join('');
        el.classList.add('open');
      } catch (err) {
        if (err.name !== 'AbortError') console.error('[trip suggest]', err.message);
      }
    }, 220);
  }

  function pickTripDest(result) {
    state.tripDest = { lat: result.lat, lng: result.lng, label: result.label };
    const destInput = document.getElementById('tripDestInput');
    if (destInput) destInput.value = result.label;
    const listEl = document.getElementById('tripSuggestList');
    if (listEl) { listEl.classList.remove('open'); listEl.innerHTML = ''; }
    const btn = document.getElementById('getDirectionsBtn');
    if (btn) btn.disabled = false;
    tripSuggestions = [];
    tripSugIdx = -1;
  }

  function erpBlock(erp) {
    const ERP_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>`;
    const OK_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
    if (!erp) return '';
    if (!erp.charging) {
      return `<div class="route-erp ok">${OK_ICON}<span>No ERP — ${escapeHtml(erp.reason)}</span></div>`;
    }
    const rangeTxt = erp.estLow === erp.estHigh
      ? `$${erp.estLow.toFixed(2)}`
      : `$${erp.estLow.toFixed(2)}–$${erp.estHigh.toFixed(2)}`;
    const lines = erp.corridors.map((c) =>
      `<div class="erp-line"><span>${escapeHtml(c.expressway)} <span class="erp-sub">${escapeHtml(c.window)}</span></span><span>$${c.rate.toFixed(2)}</span></div>`
    ).join('');
    return `
      <div class="route-erp warn">
        <div class="erp-top">${ERP_ICON}<span>Est. ERP <strong>${rangeTxt}</strong></span>
          <span class="erp-sub">${escapeHtml(erp.sgTime)} · weekday</span></div>
        ${lines}
        <div class="erp-foot">Estimate — a route may not pass every gantry on a corridor.</div>
      </div>`;
  }

  function renderTripRoutes() {
    const container = document.getElementById('tripRoutes');
    if (!container) return;
    if (!state.routes.length) { container.innerHTML = ''; return; }

    const NAV_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>`;

    // Identify a cheaper alternative (lower upper-bound ERP than the fastest)
    const fastHi = state.routes[0]?.erp?.charging ? state.routes[0].erp.estHigh : 0;

    const cards = state.routes.map((route, idx) => {
      const badgeClass = idx === 0 ? 'fastest' : 'alt';
      const summary = route.summary ? `via ${escapeHtml(route.summary)}` : 'Direct route';
      const myHi = route.erp?.charging ? route.erp.estHigh : 0;
      const saves = idx > 0 && fastHi > 0 && myHi < fastHi
        ? `<span class="route-save">−$${(fastHi - myHi).toFixed(2)}</span>` : '';
      const e = route.erp;
      let erpAmt, erpCls;
      if (!e || !e.charging) { erpAmt = '$0'; erpCls = 'free'; }
      else {
        erpAmt = e.estLow === e.estHigh
          ? `$${e.estLow.toFixed(2)}`
          : `$${e.estLow.toFixed(0)}–$${e.estHigh.toFixed(0)}`;
        erpCls = '';
      }
      const erpHeadline =
        `<span class="route-erp-total ${erpCls}">
           <span class="ret-amt">${erpAmt}</span>
           <span class="ret-lbl">${erpCls === 'free' ? 'no ERP' : 'est. ERP'}</span>
         </span>`;
      return `
        <div class="route-card" style="animation-delay:${idx * 60}ms">
          <div class="route-header">
            <span class="route-badge ${badgeClass}">${escapeHtml(route.label)}</span>
            <span class="route-summary">${summary}</span>
            <a class="nav-btn" href="${escapeHtml(route.mapsUrl)}" target="_blank" rel="noopener">
              Navigate ${NAV_ICON}
            </a>
          </div>
          <div class="route-stats">
            <span class="route-time">${escapeHtml(route.duration)}</span>
            <span class="route-dist">${escapeHtml(route.distance)}</span>
            <span class="route-stats-right">${saves}${erpHeadline}</span>
          </div>
          ${erpBlock(route.erp)}
        </div>`;
    }).join('');

    const noAlt = state.noErpFreeAlt
      ? `<div class="erp-noalt">No fully ERP-free route to here — every option passes priced gantries. Compare the estimates above to pick your trade-off.</div>`
      : '';

    const meta = state.erpMeta && state.erpMeta.effectiveFrom
      ? `<div class="erp-meta">ERP rates effective ${escapeHtml(state.erpMeta.effectiveFrom)} ·
           <a href="${escapeHtml(state.erpMeta.url || '#')}" target="_blank" rel="noopener">official LTA rates ↗</a></div>`
      : '';

    container.innerHTML = `<div class="list">${cards}</div>${noAlt}${meta}`;
  }

  function renderTrip() {
    els.locationPill.style.display = 'none';
    setBanner('');

    // Default destination = whatever was searched in the main search bar
    if (!state.tripDest && state.locationLabel && state.position) {
      state.tripDest = {
        lat: state.position.lat, lng: state.position.lng, label: state.locationLabel,
      };
    }

    // Keep form alive across route fetches — only rebuild if it's gone
    if (document.getElementById('tripForm')) {
      renderTripRoutes();
      return;
    }

    const origin = state.userGps || state.position;
    const originLabel = state.userGpsLabel
      || (origin ? 'Current location' : 'Enable location or search above');

    els.content.innerHTML = `
      <div class="trip-form" id="tripForm">
        <div class="trip-row">
          <span class="trip-dot green"></span>
          <span class="trip-origin-label">${escapeHtml(originLabel)}</span>
        </div>
        <div class="trip-line"></div>
        <div class="trip-row">
          <span class="trip-dot red"></span>
          <input id="tripDestInput" class="trip-dest-input"
                 placeholder="Where are you going?"
                 value="${state.tripDest ? escapeHtml(state.tripDest.label) : ''}"
                 autocomplete="off" spellcheck="false" autocapitalize="off" autocorrect="off" />
          <ul id="tripSuggestList" class="suggest-list"
              style="top:calc(100% + 4px);left:22px;right:0;"></ul>
        </div>
        <div class="trip-actions">
          <div class="vehicle-tabs">
            <button class="vehicle-btn ${state.tripVehicle === 'car' ? 'active' : ''}" data-v="car">Car</button>
            <button class="vehicle-btn ${state.tripVehicle === 'motorcycle' ? 'active' : ''}" data-v="motorcycle">Motorbike</button>
            <button class="vehicle-btn ${state.tripVehicle === 'heavy' ? 'active' : ''}" data-v="heavy">Heavy</button>
          </div>
          <button id="getDirectionsBtn" class="get-dir-btn" ${!state.tripDest ? 'disabled' : ''}>
            Directions
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </button>
        </div>
      </div>
      <div id="tripRoutes"></div>`;

    // Wire dest-input keydown (element-specific, safe to add once per render)
    const destInput = document.getElementById('tripDestInput');
    if (destInput) {
      destInput.addEventListener('keydown', (e) => {
        const listEl = document.getElementById('tripSuggestList');
        const items = listEl ? listEl.querySelectorAll('.suggest-item:not(.empty)') : [];
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          tripSugIdx = Math.min(tripSugIdx + 1, items.length - 1);
          items.forEach((el, i) => el.classList.toggle('active', i === tripSugIdx));
          if (items[tripSugIdx]) items[tripSugIdx].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          tripSugIdx = Math.max(tripSugIdx - 1, 0);
          items.forEach((el, i) => el.classList.toggle('active', i === tripSugIdx));
        } else if (e.key === 'Enter') {
          e.preventDefault();
          const pick = tripSuggestions[tripSugIdx >= 0 ? tripSugIdx : 0];
          if (pick) { pickTripDest(pick); return; }
          if (state.tripDest && !state.tripInFlight) loadDirections();
        } else if (e.key === 'Escape') {
          if (listEl) { listEl.classList.remove('open'); listEl.innerHTML = ''; }
        }
      });
      if (!state.tripDest) setTimeout(() => destInput.focus(), 50);
    }

    renderTripRoutes();
  }

  async function loadDirections() {
    const origin = state.userGps || state.position;
    const dest = state.tripDest;
    if (!origin || !dest || state.tripInFlight) return;

    state.tripInFlight = true;
    const routesDiv = document.getElementById('tripRoutes');
    if (routesDiv) {
      routesDiv.innerHTML = `
        <div class="state-msg" style="padding:48px 0">
          <div class="spinner"></div>
          <div class="title">Estimating ERP charges to ${escapeHtml(dest.label)}…</div>
        </div>`;
    }

    try {
      const url = `/api/directions?olat=${origin.lat}&olng=${origin.lng}` +
                  `&dlat=${dest.lat}&dlng=${dest.lng}&vehicle=${state.tripVehicle}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const json = await res.json();
      if (json.warning) showToast(json.warning, 3000);
      state.routes = json.routes || [];
      state.noErpFreeAlt = !!json.noErpFreeAlternative;
      state.erpMeta = { effectiveFrom: json.erpEffectiveFrom, url: json.erpRatesUrl };
      renderTripRoutes();
    } catch (err) {
      console.error('[directions]', err);
      const rd = document.getElementById('tripRoutes');
      if (rd) rd.innerHTML = `
        <div class="state-msg" style="padding:40px 0">
          <div class="title">Couldn't get directions</div>
          <div class="sub">${escapeHtml(err.message)}</div>
        </div>`;
    } finally {
      state.tripInFlight = false;
    }
  }

  function moveIndicator() {
    const active = els.segControl.querySelector('.seg-btn.active');
    if (!active) return;
    els.segIndicator.style.left = active.offsetLeft + 'px';
    els.segIndicator.style.width = active.offsetWidth + 'px';
  }

  function switchView(view) {
    if (view === state.view) return;
    state.view = view;
    els.segControl.querySelectorAll('.seg-btn').forEach((b) => {
      const on = b.dataset.view === view;
      b.classList.toggle('active', on);
      b.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    moveIndicator();
    state.cardEls.clear();
    els.content.innerHTML = '';
    setBanner('');

    if (view === 'parking') {
      if (!state.position) {
        showFallbackPrompt('Use your location or search for an area to see carparks.');
        els.locationPill.style.display = 'none';
        return;
      }
      if (state.carparks.length) { render(); tickUpdated(); }
      else showLoading('Finding carparks…');
      refreshActive({ silent: true });
    } else if (view === 'traffic') {
      if (state.incidents.length) { renderIncidents(); tickUpdated(); }
      else showLoading('Loading traffic incidents…');
      refreshActive({ silent: true });
      startAutoRefresh();
    } else if (view === 'ev') {
      if (state.ev.length) { renderEV(); tickUpdated(); }
      else showLoading('Loading EV charging stations…');
      refreshActive({ silent: true });
      startAutoRefresh();
    } else {
      // trip
      renderTrip();
      // No auto-refresh; clear countdown bar
      if (state.countdownTimer) clearInterval(state.countdownTimer);
      els.countdownFill.style.transform = 'scaleX(0)';
      els.updatedLine.innerHTML = '&nbsp;';
    }
  }

  async function geocode(query, signal) {
    const res = await fetch(`/api/geocode?q=${encodeURIComponent(query)}`, { signal });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error || `Geocoding failed (${res.status})`);
    }
    return res.json();
  }

  // ---------- suggestions ----------
  function renderSuggestions(results, query) {
    activeSuggestIdx = -1;
    if (!results || results.length === 0) {
      if (query && query.length >= 2) {
        els.suggestList.innerHTML = `<li class="suggest-item empty">No matches for "${escapeHtml(query)}"</li>`;
        els.suggestList.classList.add('open');
        els.searchBar.setAttribute('aria-expanded', 'true');
      } else {
        closeSuggestions();
      }
      return;
    }
    els.suggestList.innerHTML = results.map((r, i) => `
      <li class="suggest-item" role="option" data-idx="${i}">
        ${escapeHtml(r.label)}
        ${r.address && r.address !== r.label ? `<span class="sub">${escapeHtml(r.address)}</span>` : ''}
      </li>
    `).join('');
    els.suggestList.classList.add('open');
    els.searchBar.setAttribute('aria-expanded', 'true');
    state.suggestions = results;
  }

  function closeSuggestions() {
    els.suggestList.classList.remove('open');
    els.suggestList.innerHTML = '';
    els.searchBar.setAttribute('aria-expanded', 'false');
    activeSuggestIdx = -1;
    state.suggestions = [];
  }

  function highlightSuggestion(idx) {
    const items = els.suggestList.querySelectorAll('.suggest-item:not(.empty)');
    items.forEach((el, i) => el.classList.toggle('active', i === idx));
    if (idx >= 0 && items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
    activeSuggestIdx = idx;
  }

  async function fetchSuggestions(q) {
    if (suggestController) suggestController.abort();
    suggestController = new AbortController();
    try {
      const json = await geocode(q, suggestController.signal);
      renderSuggestions(json.results || [], q);
    } catch (err) {
      if (err.name === 'AbortError') return;
      console.error('suggest failed:', err);
    }
  }

  function onSearchInput() {
    const q = els.searchInput.value.trim();
    els.clearBtn.classList.toggle('show', q.length > 0);
    if (suggestTimer) clearTimeout(suggestTimer);
    if (q.length < 2) { closeSuggestions(); return; }
    suggestTimer = setTimeout(() => fetchSuggestions(q), 220);
  }

  async function pickSuggestion(result) {
    closeSuggestions();
    els.searchInput.value = result.label;
    els.searchInput.blur();
    state.position = { lat: result.lat, lng: result.lng };
    state.locationLabel = result.label;
    els.locationBtn.classList.remove('active-loc');
    state.cardEls.clear();

    // In the ERP-charges view a search sets the destination, not a carpark area
    if (state.view === 'trip') {
      state.tripDest = { lat: result.lat, lng: result.lng, label: result.label };
      if (!document.getElementById('tripForm')) renderTrip();
      const di = document.getElementById('tripDestInput');
      if (di) di.value = result.label;
      const gd = document.getElementById('getDirectionsBtn');
      if (gd) gd.disabled = false;
      if (state.userGps || state.position) loadDirections();
      updateTrafficBadge();
      updateEVBadge();
      return;
    }

    const what = state.view === 'traffic' ? 'incidents' : 'carparks';
    showLoading(`Loading ${what} near ${escapeHtml(result.label)}…`);
    await refreshActive({ silent: true });
    startAutoRefresh();
    // Refresh badges now that position has changed
    updateTrafficBadge();
    updateEVBadge();
  }

  // ---------- flow ----------
  function showLoading(message = 'Finding your location…') {
    els.content.innerHTML = `
      <div class="state-msg">
        <div class="spinner"></div>
        <div class="title">${message}</div>
      </div>`;
  }

  function showFallbackPrompt(reason) {
    els.content.innerHTML = `
      <div class="state-msg">
        <div class="title">Search for an area or postal code</div>
        <div class="sub">${reason || 'Type above to find carparks anywhere in Singapore.'}</div>
      </div>`;
    setTimeout(() => els.searchInput.focus(), 50);
  }

  async function handleSearchSubmit(e) {
    e.preventDefault();
    if (activeSuggestIdx >= 0 && state.suggestions[activeSuggestIdx]) {
      pickSuggestion(state.suggestions[activeSuggestIdx]);
      return;
    }
    const q = els.searchInput.value.trim();
    if (!q) return;
    if (state.suggestions && state.suggestions.length > 0) {
      pickSuggestion(state.suggestions[0]);
      return;
    }
    showLoading(`Looking up "${escapeHtml(q)}"…`);
    try {
      const json = await geocode(q);
      const first = (json.results || [])[0];
      if (!first) throw new Error('No matching location found');
      pickSuggestion(first);
    } catch (err) {
      els.content.innerHTML = `
        <div class="state-msg">
          <div class="title">Couldn't find "${escapeHtml(q)}"</div>
          <div class="sub">${escapeHtml(err.message)}<br><br>Try a different area name or postal code.</div>
        </div>`;
      els.searchInput.focus();
    }
  }

  function clearSearch() {
    els.searchInput.value = '';
    els.clearBtn.classList.remove('show');
    closeSuggestions();
    els.searchInput.focus();
  }

  async function reCenterOnUser() {
    if (!navigator.geolocation) {
      showToast('Geolocation not available');
      return;
    }
    showToast('Locating…');
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        state.position = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        state.locationLabel = null;
        captureUserGps(pos.coords.latitude, pos.coords.longitude);
        els.locationBtn.classList.add('active-loc');
        els.searchInput.value = '';
        els.clearBtn.classList.remove('show');
        state.cardEls.clear();
        if (state.view === 'trip') { renderTrip(); startAutoRefresh(); return; }
        showLoading(state.view === 'traffic' ? 'Finding incidents near you…' : 'Finding carparks near you…');
        await refreshActive({ silent: true });
        startAutoRefresh();
        // Refresh badges now that position has changed
        updateTrafficBadge();
        updateEVBadge();
      },
      (err) => {
        showToast(err.code === err.PERMISSION_DENIED ? 'Location permission denied' : 'Location unavailable');
      },
      { timeout: GEO_TIMEOUT_MS, maximumAge: 30000, enableHighAccuracy: false }
    );
  }

  // Record the real device location (kept separate from search-overwritten
  // state.position) and reverse-geocode it for a readable origin label.
  async function captureUserGps(lat, lng) {
    state.userGps = { lat, lng };
    try {
      const r = await fetch(`/api/revgeocode?lat=${lat}&lng=${lng}`);
      const j = await r.json();
      if (j && j.label) {
        state.userGpsLabel = j.label;
        if (state.view === 'trip') {
          const el = document.querySelector('.trip-origin-label');
          if (el) el.textContent = j.label;
        }
      }
    } catch { /* soft-fail → keep "Current location" */ }
  }

  function startAutoRefresh() {
    if (state.refreshTimer) clearInterval(state.refreshTimer);
    if (state.countdownTimer) clearInterval(state.countdownTimer);
    state.refreshTimer = setInterval(() => refreshActive({ silent: true }), REFRESH_MS);
    state.countdownTimer = setInterval(tickUpdated, 1000);
    tickUpdated();
  }

  function startWithGeolocation() {
    if (!navigator.geolocation) {
      showFallbackPrompt('Geolocation is not supported in this browser.');
      return;
    }
    showLoading();
    let resolved = false;
    const timeout = setTimeout(() => {
      if (resolved) return;
      resolved = true;
      showFallbackPrompt('Location took too long. Search by area instead.');
    }, GEO_TIMEOUT_MS + 500);

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        if (resolved) return;
        resolved = true;
        clearTimeout(timeout);
        state.position = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        captureUserGps(pos.coords.latitude, pos.coords.longitude);
        els.locationBtn.classList.add('active-loc');
        await refreshActive({ silent: true });
        startAutoRefresh();
        loadIncidents({ silent: true }); // prefetch to populate Traffic badge (filtered by 5km)
        loadEV({ silent: true });        // prefetch to populate EV badge (nearby count)
      },
      (err) => {
        if (resolved) return;
        resolved = true;
        clearTimeout(timeout);
        if (err.code === err.PERMISSION_DENIED) {
          showFallbackPrompt('Search by area or postal code below.');
        } else {
          showFallbackPrompt('Couldn’t detect location. Search by area instead.');
        }
      },
      { timeout: GEO_TIMEOUT_MS, maximumAge: 60000, enableHighAccuracy: false }
    );
  }

  // ---------- theme ----------
  function applyTheme(theme) {
    document.documentElement.dataset.theme = theme;
    try { localStorage.setItem('pq-theme', theme); } catch {}
    const meta = document.querySelector(`meta[name="theme-color"]`);
    if (meta) meta.setAttribute('content', theme === 'dark' ? '#09090b' : '#fafafa');
  }
  function toggleTheme() {
    const current = document.documentElement.dataset.theme || 'dark';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }

  // ---------- wire up ----------
  els.refreshBtn.addEventListener('click', () => {
    if (state.view === 'parking' && !state.position) return;
    state.lastRefreshAt = Date.now();
    refreshActive({ silent: false });
  });
  els.segControl.addEventListener('click', (e) => {
    const btn = e.target.closest('.seg-btn');
    if (btn) switchView(btn.dataset.view);
  });
  els.locationBtn.addEventListener('click', reCenterOnUser);
  els.themeToggle.addEventListener('click', toggleTheme);
  els.searchBar.addEventListener('submit', handleSearchSubmit);
  els.searchInput.addEventListener('input', onSearchInput);
  els.searchInput.addEventListener('focus', () => {
    if (els.searchInput.value.trim().length >= 2 && state.suggestions?.length) {
      els.suggestList.classList.add('open');
    }
  });
  els.searchInput.addEventListener('keydown', (e) => {
    const items = els.suggestList.querySelectorAll('.suggest-item:not(.empty)');
    if (e.key === 'ArrowDown') {
      if (items.length === 0) return;
      e.preventDefault();
      highlightSuggestion(Math.min(activeSuggestIdx + 1, items.length - 1));
    } else if (e.key === 'ArrowUp') {
      if (items.length === 0) return;
      e.preventDefault();
      highlightSuggestion(Math.max(activeSuggestIdx - 1, 0));
    } else if (e.key === 'Escape') {
      closeSuggestions();
    }
  });
  els.suggestList.addEventListener('click', (e) => {
    const item = e.target.closest('.suggest-item:not(.empty)');
    if (!item) return;
    const idx = parseInt(item.dataset.idx, 10);
    const result = state.suggestions[idx];
    if (result) pickSuggestion(result);
  });
  els.clearBtn.addEventListener('click', clearSearch);
  els.content.addEventListener('click', (e) => {
    const incident = e.target.closest('.incident-card');
    if (incident) {
      window.open(`https://www.google.com/maps/search/?api=1&query=${incident.dataset.lat},${incident.dataset.lng}`, '_blank', 'noopener');
      return;
    }
    const evCard = e.target.closest('.card[data-lat]');
    if (evCard) {
      window.open(`https://www.google.com/maps/dir/?api=1&destination=${evCard.dataset.lat},${evCard.dataset.lng}&travelmode=driving`, '_blank', 'noopener');
      return;
    }
    // Trip: vehicle type button
    const vBtn = e.target.closest('.vehicle-btn[data-v]');
    if (vBtn) {
      if (vBtn.dataset.v === state.tripVehicle) return;
      state.tripVehicle = vBtn.dataset.v;
      try { localStorage.setItem('pq-vehicle', state.tripVehicle); } catch {}
      document.querySelectorAll('.vehicle-btn').forEach((b) => b.classList.toggle('active', b.dataset.v === state.tripVehicle));
      // Recompute ERP for the new vehicle if routes are already shown
      if (state.routes.length && state.tripDest && !state.tripInFlight) loadDirections();
      return;
    }
    // Trip: get directions button
    if (e.target.closest('#getDirectionsBtn')) {
      if (state.tripDest && !state.tripInFlight) loadDirections();
      return;
    }
    // Trip: destination autocomplete item
    const tripItem = e.target.closest('.suggest-item[data-tidx]');
    if (tripItem) {
      const idx = parseInt(tripItem.dataset.tidx, 10);
      if (tripSuggestions[idx]) pickTripDest(tripSuggestions[idx]);
      return;
    }
  });

  // Trip dest input: delegation via content (input events bubble)
  els.content.addEventListener('input', (e) => {
    if (e.target.id !== 'tripDestInput') return;
    const q = e.target.value.trim();
    // If user edits after picking a suggestion, clear the locked dest
    if (state.tripDest && state.tripDest.label !== q) {
      state.tripDest = null;
      const btn = document.getElementById('getDirectionsBtn');
      if (btn) btn.disabled = true;
    }
    handleTripDestInput(q);
  });
  document.addEventListener('click', (e) => {
    if (!els.searchBar.contains(e.target)) closeSuggestions();
    // Also close trip destination suggest when clicking outside it
    const tripList  = document.getElementById('tripSuggestList');
    const tripInput = document.getElementById('tripDestInput');
    if (tripList && tripInput &&
        !tripList.contains(e.target) && !tripInput.contains(e.target)) {
      tripList.classList.remove('open');
    }
  });

  // Header shadow on scroll
  let lastScroll = 0;
  window.addEventListener('scroll', () => {
    const s = window.scrollY;
    els.header.classList.toggle('scrolled', s > 4);
    lastScroll = s;
  }, { passive: true });

  // Listen for OS theme changes (only if user hasn't explicitly set one)
  try {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem('pq-theme')) {
        applyTheme(e.matches ? 'dark' : 'light');
      }
    });
  } catch {}

  // Position the segmented indicator under the active tab (and keep it correct on resize)
  moveIndicator();
  window.addEventListener('resize', moveIndicator, { passive: true });
  window.addEventListener('load', moveIndicator);

  // Restore saved vehicle type for ERP (PRD §3.7)
  try {
    const v = localStorage.getItem('pq-vehicle');
    if (['car', 'motorcycle', 'heavy'].includes(v)) state.tripVehicle = v;
  } catch {}

  // Pre-load static private mall data (non-blocking)
  loadPrivateCarparks();

  const isLikelyMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  if (!isLikelyMobile && !window.isSecureContext) {
    showFallbackPrompt('Search for an area or postal code to begin.');
  } else {
    startWithGeolocation();
  }
})();
</script>
</body>
</html>
