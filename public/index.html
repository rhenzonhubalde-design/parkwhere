    return set.sort((a, b) => {
      const ia = order.indexOf(a), ib = order.indexOf(b);
      return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
    });
  }
  const erpFmt = (n) => `$${n.toFixed(2)}`;

  function renderErpRates() {
    const body = document.getElementById('tripBody');
    if (!body) return;
    if (!state.erpRates || !state.erpZoneMap) {
      body.innerHTML = `<div class="state-msg" style="padding:48px 0">
        <div class="spinner"></div><div class="title">Loading ERP rates…</div></div>`;
      loadErpData().then(() => { if (state.tripSubView === 'rates') renderErpRates(); });
      return;
    }
    const mult = erpMult();
    const dayType = state.erpDayType || erpToday();
    const t = sgNow();
    const clock = (() => {
      let h = Math.floor(t.mins / 60), m = t.mins % 60;
      const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
      return `${h}:${String(m).padStart(2, '0')}${ap}`;
    })();
    const names = state.erpZoneMap.expresswayNames || {};
    const zones = state.erpZoneMap.zones || {};

    // ---- "Currently charging now" quick view ----
    let nowBlock;
    if (dayType !== 'weekday') {
      nowBlock = `<div class="erp-now free">
        <div class="erp-now-head">${ERP_OK}<span>No ERP charges right now</span></div>
        <div class="erp-now-sub">ERP does not operate on ${ERP_DAY_LABEL[dayType]} — parking the gantries is free all day.</div>
      </div>`;
    } else {
      const charging = [];
      for (const c of state.erpRates.corridors) {
        const w = erpActiveWindow(c);
        if (w) charging.push({ x: c.expressway, z: c.id, desc: (zones[c.id] && zones[c.id].description) || c.label, amt: w.rate * mult });
      }
      charging.sort((a, b) => b.amt - a.amt);
      if (!charging.length) {
        nowBlock = `<div class="erp-now free">
          <div class="erp-now-head">${ERP_OK}<span>No ERP charges active right now</span></div>
          <div class="erp-now-sub">${clock} · ${ERP_DAY_LABEL[dayType]} — no priced gantries on the data we hold.</div>
        </div>`;
      } else {
        nowBlock = `<div class="erp-now">
          <div class="erp-now-head">${ERP_BOLT}<span>Active ERP charges now</span></div>
          <div class="erp-now-sub">${clock} · ${ERP_DAY_LABEL[dayType]} · ${escapeHtml(vehLabel())}</div>
          ${charging.map((r) => `<div class="erp-now-row">
            <span class="enr-z"><b>${escapeHtml(r.x)}</b> <small>${escapeHtml(zoneDesc(r.desc))}</small></span>
            <span class="enr-amt">${erpFmt(r.amt)}</span></div>`).join('')}
        </div>`;
      }
    }

    const effLine = `<div class="erp-rt-sub">🕐 Rates effective ${escapeHtml(state.erpRates.effectiveFrom)} ·
      <a href="${escapeHtml(state.erpRates.officialRatesUrl || '#')}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;">official LTA ↗</a></div>`;

    // ---- Expressway list (no selection) ----
    if (!state.erpXway) {
      const q = state.erpSearch.trim().toLowerCase();
      const rows = erpExpresswaysWithData().filter((x) => {
        if (!q) return true;
        return x.toLowerCase().includes(q) || (names[x] || '').toLowerCase().includes(q);
      }).map((x) => {
        const cs = state.erpRates.corridors.filter((c) => c.expressway === x);
        const gantryCount = new Set(cs.flatMap((c) => String(c.gantries).split(',').map((s) => s.trim()).filter(Boolean))).size;
        let minRate = Infinity;
        cs.forEach((c) => c.windows.forEach((w) => { if (w.rate > 0) minRate = Math.min(minRate, w.rate); }));
        const from = isFinite(minRate) ? erpFmt(minRate * mult) : '—';
        return `<button class="xway-row" data-xway="${escapeHtml(x)}">
          <span class="xway-abbr">${escapeHtml(x)}</span>
          <span class="xway-info">
            <span class="xway-name">${escapeHtml(names[x] || x)}</span>
            <span class="xway-meta">${gantryCount} gantr${gantryCount === 1 ? 'y' : 'ies'} · Rates from ${from}</span>
          </span>
          <span class="xway-chev">${ERP_CHEV}</span>
        </button>`;
      }).join('');
      body.innerHTML = `${nowBlock}
        <div class="erp-rates-search">
          ${ERP_SEARCH}
          <input id="erpSearchInput" placeholder="Search expressway e.g. AYE, CTE, PIE…"
                 value="${escapeHtml(state.erpSearch)}" autocomplete="off" spellcheck="false" />
        </div>
        ${rows || `<div class="erp-free-msg" style="background:var(--surface);color:var(--text-muted);border-color:var(--border)">No expressway matches “${escapeHtml(state.erpSearch)}”.</div>`}`;
      return;
    }

    // ---- Selected expressway: rate table ----
    const x = state.erpXway;
    const cs = state.erpRates.corridors.filter((c) => c.expressway === x);
    const vehBtns = ['car', 'motorcycle', 'heavy'].map((v) =>
      `<button class="erp-tg-btn vehicle-btn ${state.tripVehicle === v ? 'active' : ''}" data-v="${v}">${v === 'car' ? 'Car' : v === 'motorcycle' ? 'Motorbike' : 'Heavy'}</button>`).join('');
    const dayBtns = ['weekday', 'sat', 'sunph'].map((d) =>
      `<button class="erp-tg-btn ${dayType === d ? 'active' : ''}" data-day="${d}">${ERP_DAY_LABEL[d]}</button>`).join('');

    let tables;
    if (dayType !== 'weekday') {
      tables = `<div class="erp-free-msg">${ERP_OK} No ERP charges on ${ERP_DAY_LABEL[dayType]} — free all day.</div>`;
    } else {
      tables = cs.map((c) => {
        const z = zones[c.id] || {};
        const slots = c.windows.filter((w) => w.rate * mult > 0).map((w) => {
          const active = t.mins >= hhmmToMin(w.start) && t.mins < hhmmToMin(w.end);
          return `<div class="erp-slot${active ? ' active' : ''}">
            <span class="es-time">${escapeHtml(w.start)} – ${escapeHtml(w.end)}</span>
            ${active ? '<span class="es-now">active now</span>' : ''}
            <span class="es-amt">${erpFmt(w.rate * mult)}</span></div>`;
        }).join('');
        return `<div class="erp-zone">
          <div class="erp-zone-h">${escapeHtml(c.id)} · ${escapeHtml(zoneDesc(z.description || c.label))}
            <small>Gantries ${escapeHtml(String(c.gantries))}${z.direction ? ' · ' + escapeHtml(z.direction) : ''}</small></div>
          ${slots || `<div class="erp-slot"><span class="es-time" style="color:var(--text-faint)">No priced windows</span></div>`}
        </div>`;
      }).join('');
    }

    body.innerHTML = `${nowBlock}
      <button class="erp-back" id="erpBackBtn">${ERP_BACK} All expressways</button>
      <div class="erp-rt-head">${escapeHtml(x)} — ${escapeHtml(names[x] || x)}</div>
      ${effLine}
      <div class="erp-toggles">
        <div class="erp-toggle-group">${vehBtns}</div>
        <div class="erp-toggle-group">${dayBtns}</div>
      </div>
      ${tables}`;
  }

  function vehLabel() {
    return state.tripVehicle === 'car' ? 'Car'
      : state.tripVehicle === 'motorcycle' ? 'Motorcycle' : 'Heavy vehicle';
  }
  const ERP_OK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
  const ERP_BOLT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>`;
  const ERP_CHEV = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`;
  const ERP_BACK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>`;
  const ERP_SEARCH = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>`;

  function renderTrip() {
    els.locationPill.style.display = 'none';
    setBanner('');
    // Build the sub-tab shell once; afterwards only #tripBody swaps.
    if (!document.getElementById('tripSubtabs')) {
      els.content.innerHTML = `
        <div class="subtab-bar" id="tripSubtabs">
          <button class="subtab-btn" data-sub="planner">Route Planner</button>
          <button class="subtab-btn" data-sub="rates">ERP Rates</button>
        </div>
        <div id="tripBody"></div>`;
    }
    document.querySelectorAll('#tripSubtabs .subtab-btn').forEach((b) =>
      b.classList.toggle('active', b.dataset.sub === state.tripSubView));
    if (state.tripSubView === 'rates') renderErpRates();
    else renderRoutePlanner();
  }

  function renderRoutePlanner() {
    const body = document.getElementById('tripBody');
    if (!body) return;

    // Default destination = whatever was searched in the main search bar
    if (!state.tripDest && state.locationLabel && state.position) {
      state.tripDest = {
        lat: state.position.lat, lng: state.position.lng, label: state.locationLabel,
      };
    }

    // Keep form alive across route fetches — only rebuild if it's gone
    if (document.getElementById('tripForm')) {
      renderTripRoutes();
      return;
    }

    const gpsOrigin = state.userGps || state.position;
    const originValue = state.tripOrigin
      ? state.tripOrigin.label
      : (state.userGpsLabel || (gpsOrigin ? 'Current location' : ''));

    body.innerHTML = `
      <div class="trip-form" id="tripForm">
        <div class="trip-row">
          <span class="trip-dot green"></span>
          <input id="tripOriginInput" class="trip-dest-input"
                 placeholder="Start point — type or use current location"
                 value="${escapeHtml(originValue)}"
                 autocomplete="off" spellcheck="false" autocapitalize="off" autocorrect="off" />
          <button type="button" id="tripOriginGps" class="trip-gps-btn" title="Use current location" aria-label="Use current location">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path><circle cx="12" cy="12" r="8"></circle></svg>
          </button>
          <ul id="tripOriginSuggestList" class="suggest-list"
              style="top:calc(100% + 4px);left:22px;right:0;"></ul>
        </div>
        <div class="trip-line"></div>
        <div class="trip-row">
          <span class="trip-dot red"></span>
          <input id="tripDestInput" class="trip-dest-input"
                 placeholder="Where are you going?"
                 value="${state.tripDest ? escapeHtml(state.tripDest.label) : ''}"
                 autocomplete="off" spellcheck="false" autocapitalize="off" autocorrect="off" />
          <ul id="tripSuggestList" class="suggest-list"
              style="top:calc(100% + 4px);left:22px;right:0;"></ul>
        </div>
        <div class="trip-actions">
          <div class="vehicle-tabs">
            <button class="vehicle-btn ${state.tripVehicle === 'car' ? 'active' : ''}" data-v="car">Car</button>
            <button class="vehicle-btn ${state.tripVehicle === 'motorcycle' ? 'active' : ''}" data-v="motorcycle">Motorbike</button>
            <button class="vehicle-btn ${state.tripVehicle === 'heavy' ? 'active' : ''}" data-v="heavy">Heavy</button>
          </div>
        </div>
      </div>
      <div id="tripRoutes"></div>`;

    // Wire dest-input keydown (element-specific, safe to add once per render)
    const destInput = document.getElementById('tripDestInput');
    if (destInput) {
      destInput.addEventListener('keydown', (e) => {
        const listEl = document.getElementById('tripSuggestList');
        const items = listEl ? listEl.querySelectorAll('.suggest-item:not(.empty)') : [];
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          tripSugIdx = Math.min(tripSugIdx + 1, items.length - 1);
          items.forEach((el, i) => el.classList.toggle('active', i === tripSugIdx));
          if (items[tripSugIdx]) items[tripSugIdx].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          tripSugIdx = Math.max(tripSugIdx - 1, 0);
          items.forEach((el, i) => el.classList.toggle('active', i === tripSugIdx));
        } else if (e.key === 'Enter') {
          e.preventDefault();
          const pick = tripSuggestions[tripSugIdx >= 0 ? tripSugIdx : 0];
          if (pick) { pickTripDest(pick); return; }
          if (state.tripDest && !state.tripInFlight) loadDirections();
        } else if (e.key === 'Escape') {
          if (listEl) { listEl.classList.remove('open'); listEl.innerHTML = ''; }
        }
      });
      if (!state.tripDest) setTimeout(() => destInput.focus(), 50);
    }

    // Origin input: keyboard nav over its own suggestion list
    const originInput = document.getElementById('tripOriginInput');
    if (originInput) {
      originInput.addEventListener('keydown', (e) => {
        const listEl = document.getElementById('tripOriginSuggestList');
        const items = listEl ? listEl.querySelectorAll('.suggest-item:not(.empty)') : [];
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          originSugIdx = Math.min(originSugIdx + 1, items.length - 1);
          items.forEach((el, i) => el.classList.toggle('active', i === originSugIdx));
          if (items[originSugIdx]) items[originSugIdx].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          originSugIdx = Math.max(originSugIdx - 1, 0);
          items.forEach((el, i) => el.classList.toggle('active', i === originSugIdx));
        } else if (e.key === 'Enter') {
          e.preventDefault();
          const pick = originSuggestions[originSugIdx >= 0 ? originSugIdx : 0];
          if (pick) { pickTripOrigin(pick); return; }
          if (state.tripDest && !state.tripInFlight) loadDirections();
        } else if (e.key === 'Escape') {
          if (listEl) { listEl.classList.remove('open'); listEl.innerHTML = ''; }
        }
      });
    }

    renderTripRoutes();
    // Auto-load directions when we land on the planner with both endpoints
    // ready (e.g. a destination picked from the main search bar) and no
    // routes shown yet — replaces the old explicit "Directions" button.
    if (state.tripDest && !state.routes.length && !state.tripInFlight
        && (state.tripOrigin || state.userGps || state.position)) {
      loadDirections();
    }
  }

  // Origin autocomplete (mirrors the destination input)
  function handleTripOriginInput(q) {
    originSugIdx = -1;
    if (originSugTimer) clearTimeout(originSugTimer);
    const listEl = document.getElementById('tripOriginSuggestList');
    if (!listEl) return;
    if (q.length < 2) { listEl.classList.remove('open'); listEl.innerHTML = ''; return; }
    originSugTimer = setTimeout(async () => {
      if (originSugCtrl) originSugCtrl.abort();
      originSugCtrl = new AbortController();
      try {
        const json = await geocode(q, originSugCtrl.signal);
        originSuggestions = json.results || [];
        const el = document.getElementById('tripOriginSuggestList');
        if (!el) return;
        if (!originSuggestions.length) {
          el.innerHTML = `<li class="suggest-item empty">No matches for "${escapeHtml(q)}"</li>`;
          el.classList.add('open');
          return;
        }
        el.innerHTML = originSuggestions.map((r, i) => `
          <li class="suggest-item" data-oidx="${i}" role="option">
            ${escapeHtml(r.label)}
            ${r.address && r.address !== r.label ? `<span class="sub">${escapeHtml(r.address)}</span>` : ''}
          </li>`).join('');
        el.classList.add('open');
      } catch (err) {
        if (err.name !== 'AbortError') console.error('[origin suggest]', err.message);
      }
    }, 220);
  }

  function pickTripOrigin(result) {
    state.tripOrigin = { lat: result.lat, lng: result.lng, label: result.label };
    const oi = document.getElementById('tripOriginInput');
    if (oi) oi.value = result.label;
    const listEl = document.getElementById('tripOriginSuggestList');
    if (listEl) { listEl.classList.remove('open'); listEl.innerHTML = ''; }
    originSuggestions = [];
    originSugIdx = -1;
    pushRecent(result);
    if (state.tripDest && !state.tripInFlight) loadDirections();
  }

  // "Use current location" reset on the origin row
  function useTripOriginGps() {
    state.tripOrigin = null;
    const oi = document.getElementById('tripOriginInput');
    if (oi) oi.value = state.userGpsLabel || ((state.userGps || state.position) ? 'Current location' : '');
    const listEl = document.getElementById('tripOriginSuggestList');
    if (listEl) { listEl.classList.remove('open'); listEl.innerHTML = ''; }
    if (!state.userGps && !state.position && navigator.geolocation) {
      navigator.geolocation.getCurrentPosition((p) => {
        captureUserGps(p.coords.latitude, p.coords.longitude);
        state.position = state.position || { lat: p.coords.latitude, lng: p.coords.longitude };
        if (state.tripDest && !state.tripInFlight) loadDirections();
      }, () => showToast('Location unavailable'),
        { timeout: GEO_TIMEOUT_MS, maximumAge: 30000, enableHighAccuracy: false });
      return;
    }
    if (state.tripDest && !state.tripInFlight) loadDirections();
  }

  async function loadDirections() {
    const origin = state.tripOrigin || state.userGps || state.position;
    const dest = state.tripDest;
    if (!origin || !dest || state.tripInFlight) return;

    state.tripInFlight = true;
    const routesDiv = document.getElementById('tripRoutes');
    if (routesDiv) {
      routesDiv.innerHTML = `
        <div class="state-msg" style="padding:48px 0">
          <div class="spinner"></div>
          <div class="title">Estimating ERP charges to ${escapeHtml(dest.label)}…</div>
        </div>`;
    }

    try {
      const url = `/api/directions?olat=${origin.lat}&olng=${origin.lng}` +
                  `&dlat=${dest.lat}&dlng=${dest.lng}&vehicle=${state.tripVehicle}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const json = await res.json();
      if (json.warning) showToast(json.warning, 3000);
      state.routes = json.routes || [];
      state.noErpFreeAlt = !!json.noErpFreeAlternative;
      state.erpMeta = { effectiveFrom: json.erpEffectiveFrom, url: json.erpRatesUrl };
      renderTripRoutes();
    } catch (err) {
      console.error('[directions]', err);
      const rd = document.getElementById('tripRoutes');
      if (rd) rd.innerHTML = `
        <div class="state-msg" style="padding:40px 0">
          <div class="title">Couldn't get directions</div>
          <div class="sub">${escapeHtml(err.message)}</div>
        </div>`;
    } finally {
      state.tripInFlight = false;
    }
  }

  function moveIndicator() {
    const active = els.segControl.querySelector('.seg-btn.active');
    if (!active) return;
    els.segIndicator.style.left = active.offsetLeft + 'px';
    els.segIndicator.style.top = active.offsetTop + 'px';
    els.segIndicator.style.width = active.offsetWidth + 'px';
    els.segIndicator.style.height = active.offsetHeight + 'px';
  }

  function switchView(view) {
    if (view === state.view) return;
    state.view = view;
    els.segControl.querySelectorAll('.seg-btn').forEach((b) => {
      const on = b.dataset.view === view;
      b.classList.toggle('active', on);
      b.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    moveIndicator();
    state.cardEls.clear();
    els.content.innerHTML = '';
    setBanner('');

    if (view === 'parking') {
      if (!state.position) {
        showFallbackPrompt('Use your location or search for an area to see carparks.');
        els.locationPill.style.display = 'none';
        return;
      }
      if (state.carparks.length) { render(); tickUpdated(); }
      else showLoading('Finding carparks…');
      refreshActive({ silent: true });
    } else if (view === 'traffic') {
      if (state.incidents.length) { renderIncidents(); tickUpdated(); }
      else showLoading('Loading traffic incidents…');
      refreshActive({ silent: true });
      startAutoRefresh();
    } else if (view === 'ev') {
      if (state.ev.length) { renderEV(); tickUpdated(); }
      else showLoading('Loading EV charging stations…');
      refreshActive({ silent: true });
      startAutoRefresh();
    } else {
      // trip
      renderTrip();
      // No auto-refresh; clear countdown bar
      if (state.countdownTimer) clearInterval(state.countdownTimer);
      els.countdownFill.style.transform = 'scaleX(0)';
      els.updatedLine.innerHTML = '&nbsp;';
    }
  }

  async function geocode(query, signal) {
    const res = await fetch(`/api/geocode?q=${encodeURIComponent(query)}`, { signal });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error || `Geocoding failed (${res.status})`);
    }
    return res.json();
  }

  // ---------- recent locations (WS7) ----------
  const RECENTS_KEY = 'parkwhere_recent_locations';
  function loadRecents() {
    try {
      const a = JSON.parse(localStorage.getItem(RECENTS_KEY) || '[]');
      state.recentLocations = Array.isArray(a)
        ? a.filter((r) => r && r.label && isFinite(r.lat) && isFinite(r.lng)).slice(0, 5)
        : [];
    } catch { state.recentLocations = []; }
  }
  function pushRecent(loc) {
    if (!loc || !loc.label || !isFinite(loc.lat) || !isFinite(loc.lng)) return;
    const key = loc.label.trim().toLowerCase();
    const next = [{ label: loc.label, lat: loc.lat, lng: loc.lng },
      ...state.recentLocations.filter((r) => r.label.trim().toLowerCase() !== key)]
      .slice(0, 5);
    state.recentLocations = next;
    try { localStorage.setItem(RECENTS_KEY, JSON.stringify(next)); } catch {}
  }

  // ---------- suggestions ----------
  const GPS_PIN = `<span class="sg-ic">📍</span>`;
  function renderSuggestions(results, query) {
    activeSuggestIdx = -1;
    const hasQuery = query && query.length >= 2;
    const parts = [
      // Always offered, regardless of what was typed (WS7 §7.3)
      `<li class="suggest-item suggest-special" role="option" data-action="gps">${GPS_PIN}Use current location</li>`,
    ];
    if (hasQuery) {
      if (results && results.length) {
        state.suggestions = results;
        parts.push('<li class="suggest-sep">Results</li>');
        results.forEach((r, i) => parts.push(
          `<li class="suggest-item" role="option" data-idx="${i}">${escapeHtml(r.label)}` +
          `${r.address && r.address !== r.label ? `<span class="sub">${escapeHtml(r.address)}</span>` : ''}</li>`));
      } else {
        state.suggestions = [];
        parts.push(`<li class="suggest-item empty">No matches for "${escapeHtml(query)}"</li>`);
      }
    } else {
      state.suggestions = [];
      if (state.recentLocations.length) {
        parts.push('<li class="suggest-sep">Recent</li>');
        state.recentLocations.forEach((r, i) => parts.push(
          `<li class="suggest-item" role="option" data-recent="${i}">${escapeHtml(r.label)}</li>`));
      }
    }
    els.suggestList.innerHTML = parts.join('');
    els.suggestList.classList.add('open');
    els.searchBar.setAttribute('aria-expanded', 'true');
  }

  function closeSuggestions() {
    els.suggestList.classList.remove('open');
    els.suggestList.innerHTML = '';
    els.searchBar.setAttribute('aria-expanded', 'false');
    activeSuggestIdx = -1;
    state.suggestions = [];
  }

  function highlightSuggestion(idx) {
    const items = els.suggestList.querySelectorAll('.suggest-item[data-idx]');
    items.forEach((el, i) => el.classList.toggle('active', i === idx));
    if (idx >= 0 && items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
    activeSuggestIdx = idx;
  }

  async function fetchSuggestions(q) {
    if (suggestController) suggestController.abort();
    suggestController = new AbortController();
    try {
      const json = await geocode(q, suggestController.signal);
      renderSuggestions(json.results || [], q);
    } catch (err) {
      if (err.name === 'AbortError') return;
      console.error('suggest failed:', err);
    }
  }

  function onSearchInput() {
    const q = els.searchInput.value.trim();
    els.clearBtn.classList.toggle('show', q.length > 0);
    if (suggestTimer) clearTimeout(suggestTimer);
    // Empty/short → still show "Use current location" + recents (WS7)
    if (q.length < 2) { renderSuggestions([], q); return; }
    // 6-digit Singapore postal code → geocode directly (OneMap handles it)
    suggestTimer = setTimeout(() => fetchSuggestions(q), /^\d{6}$/.test(q) ? 0 : 220);
  }

  async function pickSuggestion(result) {
    closeSuggestions();
    els.searchInput.value = result.label;
    els.searchInput.blur();
    state.position = { lat: result.lat, lng: result.lng };
    state.locationLabel = result.label;
    pushRecent(result);                       // WS7: remember last 5
    setPillClear(true);                       // manual location → show ✕
    els.locationBtn.classList.remove('active-loc');
    state.cardEls.clear();

    // In the ERP-charges view a search sets the destination, not a carpark area
    if (state.view === 'trip') {
      state.tripDest = { lat: result.lat, lng: result.lng, label: result.label };
      state.tripSubView = 'planner';   // a destination search → Route Planner
      if (!document.getElementById('tripForm')) renderTrip();
      const di = document.getElementById('tripDestInput');
      if (di) di.value = result.label;
      if (state.tripOrigin || state.userGps || state.position) loadDirections();
      updateTrafficBadge();
      updateEVBadge();
      return;
    }

    const what = state.view === 'traffic' ? 'incidents' : 'carparks';
    showLoading(`Loading ${what} near ${escapeHtml(result.label)}…`);
    await refreshActive({ silent: true });
    startAutoRefresh();
    // Refresh badges now that position has changed
    updateTrafficBadge();
    updateEVBadge();
  }

  // ---------- flow ----------
  function showLoading(message = 'Finding your location…') {
    els.content.innerHTML = `
      <div class="state-msg">
        <div class="spinner"></div>
        <div class="title">${message}</div>
      </div>`;
  }

  function showFallbackPrompt(reason) {
    els.content.innerHTML = `
      <div class="state-msg">
        <div class="title">Search for an area or postal code</div>
        <div class="sub">${reason || 'Type above to find carparks anywhere in Singapore.'}</div>
      </div>`;
    setTimeout(() => els.searchInput.focus(), 50);
  }

  async function handleSearchSubmit(e) {
    e.preventDefault();
    if (activeSuggestIdx >= 0 && state.suggestions[activeSuggestIdx]) {
      pickSuggestion(state.suggestions[activeSuggestIdx]);
      return;
    }
    const q = els.searchInput.value.trim();
    if (!q) return;
    if (state.suggestions && state.suggestions.length > 0) {
      pickSuggestion(state.suggestions[0]);
      return;
    }
    showLoading(`Looking up "${escapeHtml(q)}"…`);
    try {
      const json = await geocode(q);
      const first = (json.results || [])[0];
      if (!first) throw new Error('No matching location found');
      pickSuggestion(first);
    } catch (err) {
      els.content.innerHTML = `
        <div class="state-msg">
          <div class="title">Couldn't find "${escapeHtml(q)}"</div>
          <div class="sub">${escapeHtml(err.message)}<br><br>Try a different area name or postal code.</div>
        </div>`;
      els.searchInput.focus();
    }
  }

  function clearSearch() {
    els.searchInput.value = '';
    els.clearBtn.classList.remove('show');
    renderSuggestions([], '');     // keep "Use current location" + recents visible
    els.searchInput.focus();
  }

  // Show/hide the ✕ on the location pill (only when a manual location is set)
  function setPillClear(on) {
    if (els.pillClear) els.pillClear.style.display = on ? '' : 'none';
  }

  async function reCenterOnUser() {
    if (!navigator.geolocation) {
      showToast('Geolocation not available');
      return;
    }
    showToast('Locating…');
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        state.position = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        state.locationLabel = null;
        captureUserGps(pos.coords.latitude, pos.coords.longitude);
        els.locationBtn.classList.add('active-loc');
        els.searchInput.value = '';
        els.clearBtn.classList.remove('show');
        setPillClear(false);                 // back on GPS — hide ✕
        state.cardEls.clear();
        if (state.view === 'trip') { renderTrip(); startAutoRefresh(); return; }
        showLoading(state.view === 'traffic' ? 'Finding incidents near you…' : 'Finding carparks near you…');
        await refreshActive({ silent: true });
        startAutoRefresh();
        // Refresh badges now that position has changed
        updateTrafficBadge();
        updateEVBadge();
      },
      (err) => {
        showToast(err.code === err.PERMISSION_DENIED ? 'Location permission denied' : 'Location unavailable');
      },
      { timeout: GEO_TIMEOUT_MS, maximumAge: 30000, enableHighAccuracy: false }
    );
  }

  // Record the real device location (kept separate from search-overwritten
  // state.position) and reverse-geocode it for a readable origin label.
  async function captureUserGps(lat, lng) {
    state.userGps = { lat, lng };
    try {
      const r = await fetch(`/api/revgeocode?lat=${lat}&lng=${lng}`);
      const j = await r.json();
      if (j && j.label) {
        state.userGpsLabel = j.label;
        if (state.view === 'trip' && !state.tripOrigin) {
          const oi = document.getElementById('tripOriginInput');
          if (oi && (!oi.value || oi.value === 'Current location')) oi.value = j.label;
        }
      }
    } catch { /* soft-fail → keep "Current location" */ }
  }

  function startAutoRefresh() {
    if (state.refreshTimer) clearInterval(state.refreshTimer);
    if (state.countdownTimer) clearInterval(state.countdownTimer);
    state.refreshTimer = setInterval(() => refreshActive({ silent: true }), REFRESH_MS);
    state.countdownTimer = setInterval(tickUpdated, 1000);
    tickUpdated();
  }

  function startWithGeolocation() {
    if (!navigator.geolocation) {
      showFallbackPrompt('Geolocation is not supported in this browser.');
      return;
    }
    showLoading();
    let resolved = false;
    const timeout = setTimeout(() => {
      if (resolved) return;
      resolved = true;
      showFallbackPrompt('Location took too long. Search by area instead.');
    }, GEO_TIMEOUT_MS + 500);

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        if (resolved) return;
        resolved = true;
        clearTimeout(timeout);
        state.position = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        captureUserGps(pos.coords.latitude, pos.coords.longitude);
        els.locationBtn.classList.add('active-loc');
        await refreshActive({ silent: true });
        startAutoRefresh();
        loadIncidents({ silent: true }); // prefetch to populate Traffic badge (filtered by 5km)
        loadEV({ silent: true });        // prefetch to populate EV badge (nearby count)
      },
      (err) => {
        if (resolved) return;
        resolved = true;
        clearTimeout(timeout);
        if (err.code === err.PERMISSION_DENIED) {
          showFallbackPrompt('Search by area or postal code below.');
        } else {
          showFallbackPrompt('Couldn’t detect location. Search by area instead.');
        }
      },
      { timeout: GEO_TIMEOUT_MS, maximumAge: 60000, enableHighAccuracy: false }
    );
  }

  // ---------- theme ----------
  function applyTheme(theme) {
    document.documentElement.dataset.theme = theme;
    try { localStorage.setItem('pq-theme', theme); } catch {}
    const meta = document.querySelector(`meta[name="theme-color"]`);
    if (meta) meta.setAttribute('content', theme === 'dark' ? '#09090b' : '#fafafa');
  }
  function toggleTheme() {
    const current = document.documentElement.dataset.theme || 'dark';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }

  // ---------- wire up ----------
  els.refreshBtn.addEventListener('click', () => {
    if (state.view === 'parking' && !state.position) return;
    state.lastRefreshAt = Date.now();
    refreshActive({ silent: false });
  });
  els.segControl.addEventListener('click', (e) => {
    const btn = e.target.closest('.seg-btn');
    if (btn) switchView(btn.dataset.view);
  });
  els.locationBtn.addEventListener('click', reCenterOnUser);
  els.themeToggle.addEventListener('click', toggleTheme);
  els.searchBar.addEventListener('submit', handleSearchSubmit);
  els.searchInput.addEventListener('input', onSearchInput);
  els.searchInput.addEventListener('focus', () => {
    // Always surface the dropdown (Use current location + recents/results)
    renderSuggestions(state.suggestions || [], els.searchInput.value.trim());
  });
  els.searchInput.addEventListener('keydown', (e) => {
    const items = els.suggestList.querySelectorAll('.suggest-item[data-idx]');
    if (e.key === 'ArrowDown') {
      if (items.length === 0) return;
      e.preventDefault();
      highlightSuggestion(Math.min(activeSuggestIdx + 1, items.length - 1));
    } else if (e.key === 'ArrowUp') {
      if (items.length === 0) return;
      e.preventDefault();
      highlightSuggestion(Math.max(activeSuggestIdx - 1, 0));
    } else if (e.key === 'Escape') {
      closeSuggestions();
    }
  });
  els.suggestList.addEventListener('click', (e) => {
    const item = e.target.closest('.suggest-item:not(.empty):not(.suggest-sep)');
    if (!item) return;
    if (item.dataset.action === 'gps') {
      els.searchInput.value = '';
      els.clearBtn.classList.remove('show');
      closeSuggestions();
      reCenterOnUser();
      return;
    }
    if (item.dataset.recent != null) {
      const r = state.recentLocations[parseInt(item.dataset.recent, 10)];
      if (r) pickSuggestion(r);
      return;
    }
    const result = state.suggestions[parseInt(item.dataset.idx, 10)];
    if (result) pickSuggestion(result);
  });
  els.clearBtn.addEventListener('click', clearSearch);
  if (els.pillClear) els.pillClear.addEventListener('click', (e) => {
    e.stopPropagation();
    reCenterOnUser();              // revert to GPS / "Near you"
  });
  els.content.addEventListener('click', (e) => {
    // Route-card camera strip: collapsed by default, toggle on tap
    const camTog = e.target.closest('.cam-strip-toggle');
    if (camTog) {
      const strip = camTog.nextElementSibling;
      const open = camTog.getAttribute('aria-expanded') === 'true';
      camTog.setAttribute('aria-expanded', open ? 'false' : 'true');
      if (strip && strip.classList.contains('cam-strip')) strip.hidden = open;
      return;
    }
    // ERP sub-tab switch (Route Planner / ERP Rates)
    const subBtn = e.target.closest('.subtab-btn[data-sub]');
    if (subBtn) {
      if (subBtn.dataset.sub !== state.tripSubView) {
        state.tripSubView = subBtn.dataset.sub;
        renderTrip();
      }
      return;
    }
    // ERP Rates: pick an expressway
    const xwayRow = e.target.closest('.xway-row[data-xway]');
    if (xwayRow) { state.erpXway = xwayRow.dataset.xway; renderErpRates(); return; }
    // ERP Rates: back to expressway list
    if (e.target.closest('#erpBackBtn')) { state.erpXway = null; renderErpRates(); return; }
    // ERP Rates: day-type toggle
    const dayBtn = e.target.closest('.erp-tg-btn[data-day]');
    if (dayBtn) { state.erpDayType = dayBtn.dataset.day; renderErpRates(); return; }

    const camCard = e.target.closest('.cam-card');
    if (camCard) {
      const img = camCard.querySelector('img');
      if (!img || img.style.display === 'none') return; // unavailable image
      const subEl = camCard.querySelector('.cam-sub');
      openCamLightbox(camCard.dataset.camSrc, camCard.dataset.camName,
        subEl ? subEl.textContent : '');
      return;
    }
    const incident = e.target.closest('.incident-card');
    if (incident) {
      window.open(`https://www.google.com/maps/search/?api=1&query=${incident.dataset.lat},${incident.dataset.lng}`, '_blank', 'noopener');
      return;
    }
    const evCard = e.target.closest('.card[data-lat]');
    if (evCard) {
      window.open(`https://www.google.com/maps/dir/?api=1&destination=${evCard.dataset.lat},${evCard.dataset.lng}&travelmode=driving`, '_blank', 'noopener');
      return;
    }
    // Trip: vehicle type button
    const vBtn = e.target.closest('.vehicle-btn[data-v]');
    if (vBtn) {
      if (vBtn.dataset.v === state.tripVehicle) return;
      state.tripVehicle = vBtn.dataset.v;
      try { localStorage.setItem('parkwhere_vehicle_type', state.tripVehicle); } catch {}
      document.querySelectorAll('.vehicle-btn').forEach((b) => b.classList.toggle('active', b.dataset.v === state.tripVehicle));
      if (state.tripSubView === 'rates') { renderErpRates(); return; }
      // Recompute ERP for the new vehicle if routes are already shown
      if (state.routes.length && state.tripDest && !state.tripInFlight) loadDirections();
      return;
    }
    // Trip: destination autocomplete item
    const tripItem = e.target.closest('.suggest-item[data-tidx]');
    if (tripItem) {
      const idx = parseInt(tripItem.dataset.tidx, 10);
      if (tripSuggestions[idx]) pickTripDest(tripSuggestions[idx]);
      return;
    }
    // Trip: origin autocomplete item
    const origItem = e.target.closest('.suggest-item[data-oidx]');
    if (origItem) {
      const idx = parseInt(origItem.dataset.oidx, 10);
      if (originSuggestions[idx]) pickTripOrigin(originSuggestions[idx]);
      return;
    }
    // Trip: "use current location" on the origin row
    if (e.target.closest('#tripOriginGps')) { useTripOriginGps(); return; }
  });

  // Camera lightbox: close on button, backdrop, or Escape
  els.camLbClose.addEventListener('click', closeCamLightbox);
  els.camLightbox.addEventListener('click', (e) => {
    if (e.target === els.camLightbox) closeCamLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && els.camLightbox.classList.contains('open')) closeCamLightbox();
  });

  // Trip dest input: delegation via content (input events bubble)
  els.content.addEventListener('input', (e) => {
    if (e.target.id === 'erpSearchInput') {
      state.erpSearch = e.target.value;
      renderErpRates();
      const ni = document.getElementById('erpSearchInput');
      if (ni) { ni.focus(); const v = ni.value; ni.value = ''; ni.value = v; }
      return;
    }
    if (e.target.id === 'tripOriginInput') {
      const q = e.target.value.trim();
      // Editing after a pick unlocks the origin → revert to GPS unless re-picked
      if (state.tripOrigin && state.tripOrigin.label !== q) state.tripOrigin = null;
      handleTripOriginInput(q);
      return;
    }
    if (e.target.id !== 'tripDestInput') return;
    const q = e.target.value.trim();
    // If user edits after picking a suggestion, clear the locked dest
    if (state.tripDest && state.tripDest.label !== q) {
      state.tripDest = null;
    }
    handleTripDestInput(q);
  });
  document.addEventListener('click', (e) => {
    if (!els.searchBar.contains(e.target)) closeSuggestions();
    // Also close trip dest/origin suggests when clicking outside them
    for (const [lid, iid] of [['tripSuggestList', 'tripDestInput'],
                              ['tripOriginSuggestList', 'tripOriginInput']]) {
      const lst = document.getElementById(lid), inp = document.getElementById(iid);
      if (lst && inp && !lst.contains(e.target) && !inp.contains(e.target)) {
        lst.classList.remove('open');
      }
    }
  });

  // Header shadow on scroll
  let lastScroll = 0;
  window.addEventListener('scroll', () => {
    const s = window.scrollY;
    els.header.classList.toggle('scrolled', s > 4);
    lastScroll = s;
  }, { passive: true });

  // Listen for OS theme changes (only if user hasn't explicitly set one)
  try {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem('pq-theme')) {
        applyTheme(e.matches ? 'dark' : 'light');
      }
    });
  } catch {}

  // Position the segmented indicator under the active tab (and keep it correct on resize)
  moveIndicator();
  window.addEventListener('resize', moveIndicator, { passive: true });
  window.addEventListener('load', moveIndicator);

  // Restore saved vehicle type — shared by Route Planner & ERP Rates.
  // Canonical key is parkwhere_vehicle_type; migrate the legacy pq-vehicle.
  try {
    let v = localStorage.getItem('parkwhere_vehicle_type');
    if (!v) {
      const old = localStorage.getItem('pq-vehicle');
      if (old) { v = old; localStorage.setItem('parkwhere_vehicle_type', old); }
    }
    if (['car', 'motorcycle', 'heavy'].includes(v)) state.tripVehicle = v;
  } catch {}

  // Pre-load static private mall data + carpark metadata (non-blocking)
  loadPrivateCarparks();
  loadCarparkMeta();
  loadRecents();   // WS7: restore last-5 recent locations (session-independent store)

  const isLikelyMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  if (!isLikelyMobile && !window.isSecureContext) {
    showFallbackPrompt('Search for an area or postal code to begin.');
  } else {
    startWithGeolocation();
  }
})();
</script>
</body>
</html>
